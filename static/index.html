<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>TG AI System</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--card:#1a1d27;--card2:#22263a;--border:#2d3150;
  --accent:#6c63ff;--accent2:#4ade80;--danger:#f87171;--warn:#fbbf24;
  --text:#e2e8f0;--muted:#64748b;--white:#fff;--sw:230px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Segoe UI',Tahoma,Arial,sans-serif;direction:rtl}
a{color:inherit;text-decoration:none}

/* Layout */
#app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:var(--sw);background:var(--card);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* Logo */
.logo{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.logo-icon{width:38px;height:38px;background:linear-gradient(135deg,var(--accent),#a78bfa);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.logo-text{font-weight:800;font-size:14px;color:var(--white)}
.logo-sub{font-size:10px;color:var(--muted)}

/* Nav */
nav{padding:10px 8px;flex:1}
.nav-btn{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:9px;cursor:pointer;color:var(--muted);font-size:13px;transition:all .15s;margin-bottom:2px;width:100%;background:none;border:none;text-align:right;font-family:inherit}
.nav-btn:hover{background:var(--card2);color:var(--text)}
.nav-btn.active{background:linear-gradient(135deg,rgba(108,99,255,.3),rgba(167,139,250,.15));color:var(--white);font-weight:700}
.nav-icon{width:22px;text-align:center;font-size:16px;flex-shrink:0}

/* Topbar */
.topbar{background:var(--card);border-bottom:1px solid var(--border);padding:10px 18px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.topbar-title{font-size:15px;font-weight:800;color:var(--white);min-width:120px;white-space:nowrap}
.cp-input{flex:1;background:var(--card2);border:1px solid var(--border);border-radius:9px;padding:8px 13px;color:var(--text);font-size:13px;font-family:inherit;outline:none;direction:rtl;max-width:600px}
.cp-input:focus{border-color:var(--accent)}
.cp-input::placeholder{color:var(--muted)}
.ws-pill{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);padding:4px 9px;border-radius:20px;background:var(--card2);border:1px solid var(--border);white-space:nowrap;flex-shrink:0}
.ws-dot{width:7px;height:7px;border-radius:50%}
.ws-dot.on{background:var(--accent2)}.ws-dot.off{background:var(--danger)}

/* Content */
#content{flex:1;overflow-y:auto;padding:20px}

/* Buttons */
.btn{padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;transition:all .15s;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-primary{background:linear-gradient(135deg,var(--accent),#a78bfa);color:#fff}
.btn-primary:hover:not(:disabled){opacity:.88}
.btn-success{background:linear-gradient(135deg,#059669,var(--accent2));color:#fff}
.btn-danger{background:linear-gradient(135deg,#dc2626,var(--danger));color:#fff}
.btn-ghost{background:var(--card2);color:var(--text);border:1px solid var(--border)}
.btn-ghost:hover:not(:disabled){border-color:var(--accent);color:var(--accent)}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:7px}
.btn-xs{padding:4px 9px;font-size:11px;border-radius:6px}

/* Card */
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:14px}
.page-hdr{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.page-title{font-size:20px;font-weight:800;color:var(--white)}
.page-sub{font-size:12px;color:var(--muted);margin-top:3px}

/* Stat grid */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:16px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;display:flex;align-items:center;gap:12px}
.stat-ico{width:46px;height:46px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.stat-val{font-size:24px;font-weight:800;color:var(--white);line-height:1}
.stat-lbl{font-size:12px;color:var(--muted);margin-top:3px}
.stat-chg{font-size:11px;color:var(--accent2);margin-top:2px}

/* Table */
.tbl-wrap{border:1px solid var(--border);border-radius:10px;overflow:auto;margin-bottom:14px}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{background:var(--card2);padding:10px 12px;text-align:right;color:var(--muted);font-weight:600;border-bottom:1px solid var(--border);white-space:nowrap}
tbody td{padding:9px 12px;border-bottom:1px solid rgba(45,49,80,.35);vertical-align:middle}
tbody tr:hover{background:rgba(108,99,255,.04)}
tbody tr:last-child td{border:none}

/* Badge */
.badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.bg-green{background:rgba(74,222,128,.15);color:var(--accent2)}
.bg-red{background:rgba(248,113,113,.15);color:var(--danger)}
.bg-yellow{background:rgba(251,191,36,.15);color:var(--warn)}
.bg-purple{background:rgba(108,99,255,.15);color:#a78bfa}
.bg-blue{background:rgba(96,165,250,.15);color:#60a5fa}
.bg-gray{background:rgba(100,116,139,.15);color:var(--muted)}

/* Form */
.fg{margin-bottom:13px}
.flbl{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;font-weight:500}
.finput{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-size:13px;font-family:inherit;outline:none;transition:border-color .2s}
.finput:focus{border-color:var(--accent)}
textarea.finput{min-height:80px;resize:vertical}
select.finput option{background:var(--card2)}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);display:flex;align-items:center;justify-content:center;z-index:500;padding:16px}
.modal{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:22px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.modal-title{font-size:16px;font-weight:700;color:var(--white)}
.modal-x{background:var(--card2);border:1px solid var(--border);width:30px;height:30px;border-radius:7px;cursor:pointer;color:var(--muted);font-size:18px;display:flex;align-items:center;justify-content:center}
.modal-foot{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}

/* Toast */
.toast-wrap{position:fixed;bottom:20px;left:20px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:11px 15px;min-width:210px;max-width:300px;display:flex;align-items:center;gap:8px;font-size:13px;box-shadow:0 6px 24px rgba(0,0,0,.5);animation:tin .25s ease;pointer-events:auto}
.toast.ok{border-color:var(--accent2)}.toast.err{border-color:var(--danger)}
@keyframes tin{from{transform:translateX(-20px);opacity:0}to{transform:none;opacity:1}}

/* Bar chart */
.bar-wrap{display:flex;align-items:flex-end;gap:3px;height:100px;padding:4px 0}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;min-width:0}
.bar-fill{width:100%;border-radius:3px 3px 0 0;min-height:2px}
.bar-lbl{font-size:9px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;width:100%;text-align:center}

/* Misc */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:700px){.grid2{grid-template-columns:1fr}}
.filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:13px}
.f-inp{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:7px 11px;color:var(--text);font-size:12px;font-family:inherit;outline:none}
.f-inp:focus{border-color:var(--accent)}
.empty{text-align:center;padding:36px;color:var(--muted)}
.empty-ico{font-size:36px;margin-bottom:8px}
.spin{display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle}
@keyframes sp{to{transform:rotate(360deg)}}
.prog{height:5px;background:var(--card2);border-radius:4px;overflow:hidden}
.prog-fill{height:100%;border-radius:4px;transition:width .4s}
.sec-title{font-size:14px;font-weight:700;color:var(--white);margin-bottom:10px}
.row{display:flex;align-items:center;gap:10px}
</style>
</head>
<body>

<div id="app">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="logo">
      <div class="logo-icon">🤖</div>
      <div>
        <div class="logo-text">TG AI System</div>
        <div class="logo-sub">نظام إدارة ذكي</div>
      </div>
    </div>
    <nav id="nav"></nav>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="topbar">
      <span class="topbar-title" id="topbar-title">لوحة التحكم</span>
      <input class="cp-input" id="cp-input" placeholder="🤖 أكتب أمراً... مثال: انشر الإعلان في المجموعات التعليمية" />
      <button class="btn btn-primary btn-sm" id="cp-btn">⚡ تنفيذ</button>
      <div class="ws-pill"><div class="ws-dot off" id="ws-dot"></div><span id="ws-lbl">غير متصل</span></div>
    </div>
    <div id="content"><div class="empty"><div class="spin"></div></div></div>
  </div>
</div>

<div class="toast-wrap" id="toasts"></div>

<script>
'use strict';

/* ═══ Toast ═══ */
function toast(msg, type='ok'){
  const w=document.getElementById('toasts');
  const el=document.createElement('div');
  el.className=`toast ${type}`;
  el.innerHTML=`<span>${type==='ok'?'✅':'❌'}</span><span>${msg}</span>`;
  w.appendChild(el);
  setTimeout(()=>el.remove(),3500);
}

/* ═══ API ═══ */
async function api(path, opts={}){
  const r=await fetch(path,{headers:{'Content-Type':'application/json'},...opts});
  if(!r.ok){const t=await r.text().catch(()=>'');throw new Error(`${r.status}: ${t.slice(0,120)}`);}
  return r.json();
}

/* ═══ Modal ═══ */
function openModal(title, html, onSave){
  const ov=document.createElement('div');
  ov.className='overlay';
  ov.innerHTML=`
    <div class="modal">
      <div class="modal-hdr">
        <span class="modal-title">${title}</span>
        <button class="modal-x">×</button>
      </div>
      <div class="modal-body">${html}</div>
      <div class="modal-foot">
        <button class="btn btn-ghost close-btn">إلغاء</button>
        ${onSave?'<button class="btn btn-primary save-btn">حفظ</button>':''}
      </div>
    </div>`;
  document.body.appendChild(ov);
  const close=()=>ov.remove();
  ov.querySelector('.modal-x')?.addEventListener('click',close);
  ov.querySelector('.close-btn')?.addEventListener('click',close);
  ov.querySelector('.save-btn')?.addEventListener('click',()=>onSave(ov,close));
  ov.addEventListener('click',e=>{if(e.target===ov)close();});
  return ov;
}

/* ═══ Badge ═══ */
function badge(label, color='gray'){
  return `<span class="badge bg-${color}">${label}</span>`;
}

/* ═══ Bar Chart ═══ */
function barChart(data, xKey, yKey, color='#6c63ff'){
  if(!data||!data.length) return '<div class="empty">لا توجد بيانات</div>';
  const max=Math.max(...data.map(d=>d[yKey]||0))||1;
  const items=data.slice(-20).map(d=>{
    const pct=((d[yKey]||0)/max*100).toFixed(1);
    const lbl=String(d[xKey]||'').slice(-5);
    return `<div class="bar-col" title="${d[xKey]}: ${d[yKey]}">
      <div class="bar-fill" style="height:${pct}%;background:${color}"></div>
      <div class="bar-lbl">${lbl}</div>
    </div>`;
  }).join('');
  return `<div class="bar-wrap">${items}</div>`;
}

/* ═══ Pages ═══ */

/* Dashboard */
async function pageDashboard(){
  const el=document.getElementById('content');
  el.innerHTML='<div class="empty"><div class="spin"></div> جارٍ التحميل...</div>';
  try{
    const [s,t,cats,bots]=await Promise.all([
      api('/api/stats/overview'),
      api('/api/stats/messages_timeline'),
      api('/api/stats/groups_by_category'),
      api('/api/stats/protection_bots'),
    ]);
    const acc=s.accounts||{};
    const grp=s.groups||{};
    const msg=s.messages||{};
    const cam=s.campaigns||{};
    el.innerHTML=`
      <div class="page-hdr"><div>
        <div class="page-title">لوحة التحكم 📊</div>
        <div class="page-sub">نظرة عامة على أداء النظام</div>
      </div></div>
      <div class="stat-grid">
        <div class="stat-card"><div class="stat-ico" style="background:rgba(108,99,255,.15)">👤</div><div>
          <div class="stat-val">${acc.active||0}<span style="font-size:14px;color:var(--muted)">/${acc.total||0}</span></div>
          <div class="stat-lbl">الحسابات النشطة</div></div></div>
        <div class="stat-card"><div class="stat-ico" style="background:rgba(74,222,128,.15)">👥</div><div>
          <div class="stat-val">${(grp.joined||0).toLocaleString()}</div>
          <div class="stat-lbl">مجموعة منضم إليها</div>
          <div class="stat-chg">من ${grp.total||0} إجمالاً</div></div></div>
        <div class="stat-card"><div class="stat-ico" style="background:rgba(96,165,250,.15)">📨</div><div>
          <div class="stat-val">${(msg.total||0).toLocaleString()}</div>
          <div class="stat-lbl">رسائل مرسلة</div>
          <div class="stat-chg">نجاح ${msg.success_rate||0}%</div></div></div>
        <div class="stat-card"><div class="stat-ico" style="background:rgba(248,113,113,.15)">🗑</div><div>
          <div class="stat-val">${msg.deleted||0}</div>
          <div class="stat-lbl">رسائل محذوفة</div></div></div>
        <div class="stat-card"><div class="stat-ico" style="background:rgba(251,191,36,.15)">🚀</div><div>
          <div class="stat-val">${cam.total||0}</div>
          <div class="stat-lbl">حملات</div></div></div>
      </div>
      <div class="grid2">
        <div class="card"><div class="sec-title">📈 الرسائل اليومية</div>${barChart(t,'date','count','#6c63ff')}</div>
        <div class="card"><div class="sec-title">🏷 المجموعات حسب الفئة</div>${
          cats.length?cats.map((c,i)=>{
            const clrs=['#6c63ff','#4ade80','#f87171','#fbbf24','#60a5fa','#f472b6'];
            return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:7px;font-size:13px">
              <div style="width:10px;height:10px;border-radius:3px;background:${clrs[i%clrs.length]};flex-shrink:0"></div>
              <span style="flex:1">${c.category||'غير مصنف'}</span>
              <span style="color:var(--accent2);font-weight:700">${c.count}</span></div>`;
          }).join(''):'<div class="empty">لا توجد بيانات</div>'
        }</div>
      </div>
      ${bots.length?`<div class="card"><div class="sec-title">🤖 بوتات الحماية المكتشفة</div>
        <div style="display:flex;gap:10px;flex-wrap:wrap">${bots.map(b=>`
          <div style="background:var(--card2);border:1px solid var(--border);border-radius:9px;padding:12px 16px;text-align:center;min-width:90px">
            <div style="font-size:22px">${b.bot?.includes('سريع')?'⚡':'🛡'}</div>
            <div style="font-weight:800;font-size:18px;color:var(--white)">${b.count}</div>
            <div style="font-size:10px;color:var(--muted)">${b.bot}</div></div>`).join('')}
        </div></div>`:''}`;
  }catch(e){
    el.innerHTML=`<div class="card"><div style="color:var(--danger)">❌ خطأ في الاتصال: ${e.message}</div>
      <div style="margin-top:10px;color:var(--muted);font-size:13px">تأكد أن الخادم يعمل على نفس النطاق</div></div>`;
  }
}

/* Groups */
async function pageGroups(){
  const el=document.getElementById('content');
  el.innerHTML=`
    <div class="page-hdr">
      <div><div class="page-title">المجموعات 👥</div><div class="page-sub" id="grp-sub"></div></div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn btn-ghost btn-sm" id="sync-btn">🔄 مزامنة</button>
        <button class="btn btn-primary btn-sm" id="add-grp-btn">+ إضافة</button>
      </div>
    </div>
    <div class="filter-row">
      <input class="f-inp" id="grp-search" placeholder="🔍 بحث..." style="flex:1;min-width:130px">
      <select class="f-inp" id="grp-cat">
        <option value="">كل الفئات</option>
        ${['تعليمي','تجاري','رياضي','ترفيهي','ديني','تقني','طبي','أخرى'].map(c=>`<option>${c}</option>`).join('')}
      </select>
      <select class="f-inp" id="grp-joined">
        <option value="">كل الحالات</option>
        <option value="true">منضم</option>
        <option value="false">غير منضم</option>
      </select>
      <button class="btn btn-ghost btn-sm" id="grp-refresh">تحديث</button>
    </div>
    <div id="grp-table"></div>`;

  async function loadGroups(){
    const search=document.getElementById('grp-search')?.value||'';
    const cat=document.getElementById('grp-cat')?.value||'';
    const joined=document.getElementById('grp-joined')?.value||'';
    const p=new URLSearchParams();
    if(search)p.set('search',search);if(cat)p.set('category',cat);if(joined!=='')p.set('is_joined',joined);
    const tbl=document.getElementById('grp-table');
    tbl.innerHTML='<div class="empty"><div class="spin"></div></div>';
    try{
      const data=await api('/api/groups?'+p);
      document.getElementById('grp-sub').textContent=data.length+' مجموعة';
      if(!data.length){tbl.innerHTML='<div class="empty"><div class="empty-ico">👥</div>لا توجد مجموعات</div>';return;}
      tbl.innerHTML=`<div class="tbl-wrap"><table>
        <thead><tr><th>المجموعة</th><th>الأعضاء</th><th>الفئة</th><th>الحالة</th><th>بوت الحماية</th><th></th></tr></thead>
        <tbody>${data.map(g=>`<tr>
          <td><div style="font-weight:600;color:var(--white)">${g.title||''}</div>${g.username?`<div style="font-size:11px;color:var(--muted)">@${g.username}</div>`:''}</td>
          <td style="color:var(--accent2);font-weight:600">${(g.member_count||0).toLocaleString()}</td>
          <td>${g.category?badge(g.category,'purple'):'<span style="color:var(--muted)">—</span>'}</td>
          <td>${badge(g.is_joined?'منضم':'غير منضم',g.is_joined?'green':'gray')}</td>
          <td>${g.protection_bot?badge(g.protection_bot,'red'):'<span style="color:var(--muted)">—</span>'}</td>
          <td><button class="btn btn-ghost btn-xs edit-grp" data-id="${g.id}" data-cat="${g.category||''}" data-sub="${g.sub_category||''}" data-notes="${(g.notes||'').replace(/"/g,'&quot;')}">✏️</button></td>
        </tr>`).join('')}</tbody>
      </table></div>`;
      tbl.querySelectorAll('.edit-grp').forEach(btn=>btn.addEventListener('click',()=>{
        const {id,cat,sub,notes}=btn.dataset;
        editGroup(parseInt(id),cat,sub,notes,loadGroups);
      }));
    }catch(e){tbl.innerHTML=`<div class="card" style="color:var(--danger)">❌ ${e.message}</div>`;}
  }

  document.getElementById('grp-refresh')?.addEventListener('click',loadGroups);
  document.getElementById('grp-search')?.addEventListener('input',()=>setTimeout(loadGroups,400));
  document.getElementById('grp-cat')?.addEventListener('change',loadGroups);
  document.getElementById('grp-joined')?.addEventListener('change',loadGroups);
  document.getElementById('sync-btn')?.addEventListener('click',async()=>{
    const id=prompt('معرف الحساب للمزامنة:');if(!id)return;
    try{const r=await api('/api/groups/action',{method:'POST',body:JSON.stringify({action:'sync_dialogs',account_id:parseInt(id)})});
      toast(`✅ تمت المزامنة – ${r.added} مجموعة جديدة`);loadGroups();}
    catch(e){toast(e.message,'err');}
  });
  document.getElementById('add-grp-btn')?.addEventListener('click',()=>editGroup(null,'','','',loadGroups));
  loadGroups();
}

function editGroup(id,cat,sub,notes,onDone){
  const CATS=['تعليمي','تجاري','رياضي','ترفيهي','ديني','تقني','طبي','أخرى'];
  openModal(id?'تعديل مجموعة':'إضافة مجموعة',`
    <div class="fg"><label class="flbl">الفئة</label>
      <select class="finput" id="m-cat">${CATS.map(c=>`<option${c===cat?' selected':''}>${c}</option>`).join('')}</select></div>
    <div class="fg"><label class="flbl">الفئة الفرعية</label><input class="finput" id="m-sub" value="${sub||''}"></div>

/* Campaigns */
async function pageCampaigns(){
  const el=document.getElementById('content');
  el.innerHTML=`
    <div class="page-hdr">
      <div><div class="page-title">الحملات 🚀</div><div class="page-sub" id="camp-sub"></div></div>

    </div>
    <div id="camp-list"><div class="empty"><div class="spin"></div></div></div>`;

  async function loadCamps(){
    const list=document.getElementById('camp-list');

    const SC={draft:['مسودة','gray'],running:['يعمل','green'],paused:['موقوف','yellow'],done:['مكتمل','blue']};
    list.innerHTML=camps.map(c=>{
      const [lbl,clr]=SC[c.status]||['غير معروف','gray'];
      return `<div class="card" style="display:flex;align-items:center;gap:12px">
        <div style="flex:1">
          <div style="font-weight:700;font-size:15px;color:var(--white);margin-bottom:6px">${c.name}</div>
          <div style="display:flex;gap:6px;flex-wrap:wrap">${badge(lbl,clr)}
            ${c.stats?.sent?badge('📨 '+c.stats.sent,'blue'):''}
            ${c.stats?.deleted?badge('🗑 '+c.stats.deleted,'red'):''}</div>
        </div>
        <div style="display:flex;gap:8px">
          ${c.status!=='running'?`<button class="btn btn-success btn-sm run-camp" data-id="${c.id}">▶ تشغيل</button>`:''}
          <button class="btn btn-danger btn-sm del-camp" data-id="${c.id}">🗑</button>
        </div></div>`;
    }).join('');
    list.querySelectorAll('.run-camp').forEach(b=>b.addEventListener('click',async()=>{
      try{await api(`/api/campaigns/${b.dataset.id}/run`,{method:'POST'});toast('🚀 بدأ التشغيل');loadCamps();}
      catch(e){toast(e.message,'err');}
    }));
    list.querySelectorAll('.del-camp').forEach(b=>b.addEventListener('click',async()=>{
      if(!confirm('حذف الحملة؟'))return;
      try{await api(`/api/campaigns/${b.dataset.id}`,{method:'DELETE'});toast('تم الحذف');loadCamps();}
      catch(e){toast(e.message,'err');}
    }));
  }

  document.getElementById('new-camp-btn')?.addEventListener('click',async()=>{
    const tmpls=await api('/api/templates').catch(()=>[]);
    openModal('حملة جديدة',`
      <div class="fg"><label class="flbl">اسم الحملة *</label><input class="finput" id="m-name" placeholder="مثال: حملة رمضان"></div>
      <div class="fg"><label class="flbl">الفئة المستهدفة</label><input class="finput" id="m-cat" placeholder="تعليمي، تجاري..."></div>
      ${tmpls.length?`<div class="fg"><label class="flbl">القوالب (Ctrl+Click لتعدد)</label>
        <select class="finput" id="m-tmpls" multiple size="${Math.min(tmpls.length,4)}">${tmpls.map(t=>`<option value="${t.id}">${t.name}</option>`).join('')}</select></div>`:''}`,
      async(ov,close)=>{

        const sel=ov.querySelector('#m-tmpls');

        try{
          await api('/api/campaigns',{method:'POST',body:JSON.stringify({name,target_criteria:{category:cat},template_ids:tids})});

/* Accounts */
async function pageAccounts(){
  const el=document.getElementById('content');
  el.innerHTML=`
    <div class="page-hdr">
      <div><div class="page-title">الحسابات 👤</div><div class="page-sub" id="acc-sub"></div></div>
      <button class="btn btn-primary btn-sm" id="add-acc-btn">+ إضافة حساب</button>
    </div>
    <div id="acc-table"><div class="empty"><div class="spin"></div></div></div>`;

  async function loadAccs(){
    const tbl=document.getElementById('acc-table');
    try{
      const data=await api('/api/accounts');
      document.getElementById('acc-sub').textContent=data.length+' حساب';
      if(!data.length){tbl.innerHTML='<div class="empty"><div class="empty-ico">👤</div>لا توجد حسابات</div>';return;}
      const SC={active:'green',banned:'red',flood:'yellow',pending:'gray'};
      tbl.innerHTML=`<div class="tbl-wrap"><table>
        <thead><tr><th>الرقم</th><th>الحالة</th><th>الصحة</th><th>آخر نشاط</th><th></th></tr></thead>
        <tbody>${data.map(a=>`<tr>
          <td style="font-weight:600;color:var(--white);direction:ltr;text-align:left">${a.phone}</td>
          <td>${badge(a.status,SC[a.status]||'gray')}</td>
          <td><div style="display:flex;align-items:center;gap:8px">
            <div class="prog" style="flex:1;max-width:80px"><div class="prog-fill" style="width:${a.health_score}%;background:${a.health_score>70?'var(--accent2)':a.health_score>40?'var(--warn)':'var(--danger)'}"></div></div>
            <span style="font-size:12px">${a.health_score}%</span></div></td>
          <td style="font-size:11px;color:var(--muted)">${a.last_active?new Date(a.last_active).toLocaleString('ar'):'—'}</td>
          <td><button class="btn btn-danger btn-xs del-acc" data-id="${a.id}">🗑</button></td>
        </tr>`).join('')}</tbody>
      </table></div>`;
      tbl.querySelectorAll('.del-acc').forEach(b=>b.addEventListener('click',async()=>{
        if(!confirm('حذف الحساب؟'))return;
        try{await api(`/api/accounts/${b.dataset.id}`,{method:'DELETE'});toast('تم الحذف');loadAccs();}
        catch(e){toast(e.message,'err');}
      }));
    }catch(e){tbl.innerHTML=`<div class="card" style="color:var(--danger)">❌ ${e.message}</div>`;}
  }

  document.getElementById('add-acc-btn')?.addEventListener('click',()=>{
    // Step 1: phone
    const ov=openModal('إضافة حساب – الخطوة 1',`
      <div class="fg"><label class="flbl">رقم الهاتف (مع كود الدولة)</label>
        <input class="finput" id="m-phone" placeholder="+966501234567" dir="ltr"></div>`,
      async(ov2,close)=>{
        const phone=ov2.querySelector('#m-phone').value.trim();
        if(!phone)return toast('أدخل رقم الهاتف','err');
        const saveBtn=ov2.querySelector('.save-btn');
        saveBtn.disabled=true;saveBtn.textContent='جارٍ الإرسال...';
        try{
          const r=await api('/api/accounts/add',{method:'POST',body:JSON.stringify({phone})});
          if(r.status==='code_sent'){
            close();
            // Step 2: code
            openModal('إدخال الكود – الخطوة 2',`
              <div style="color:var(--muted);font-size:13px;margin-bottom:14px">📱 تم إرسال كود إلى ${phone}</div>
              <div class="fg"><label class="flbl">كود التحقق</label><input class="finput" id="m-code" placeholder="12345" dir="ltr"></div>
              <div class="fg"><label class="flbl">كلمة المرور (اختياري – للتحقق بخطوتين)</label><input class="finput" type="password" id="m-pass"></div>`,
              async(ov3,close3)=>{
                const code=ov3.querySelector('#m-code').value.trim();
                const pass=ov3.querySelector('#m-pass').value;
                if(!code)return toast('أدخل الكود','err');
                try{
                  const r2=await api('/api/accounts/verify',{method:'POST',body:JSON.stringify({phone,code,password:pass||undefined})});
                  if(r2.status==='ok'){toast('✅ تم إضافة الحساب');close3();loadAccs();}
                  else toast(r2.detail||'كود خاطئ','err');
                }catch(e){toast(e.message,'err');}
              }
            );
          }else toast(r.detail||'خطأ','err');
        }catch(e){toast(e.message,'err');}
        finally{if(saveBtn){saveBtn.disabled=false;saveBtn.textContent='حفظ';}}
      }
    );
  });
  loadAccs();
}

/* ═══ Router ═══ */
const PAGES=[
  {id:'dashboard', icon:'📊', label:'لوحة التحكم',  fn:pageDashboard},
  {id:'groups',    icon:'👥', label:'المجموعات',    fn:pageGroups},
  {id:'campaigns', icon:'🚀', label:'الحملات',      fn:pageCampaigns},
  {id:'analytics', icon:'📈', label:'التحليلات',    fn:pageAnalytics},
  {id:'accounts',  icon:'👤', label:'الحسابات',     fn:pageAccounts},
  {id:'templates', icon:'📝', label:'القوالب',      fn:pageTemplates},
  {id:'audit',     icon:'📋', label:'سجل التدقيق',  fn:pageAudit},
  {id:'settings',  icon:'⚙️', label:'الإعدادات',   fn:pageSettings},
];

let currentPage='dashboard';

function navigate(id){
  currentPage=id;
  const pg=PAGES.find(p=>p.id===id)||PAGES[0];
  document.getElementById('topbar-title').textContent=`${pg.icon} ${pg.label}`;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.id===id));
  pg.fn();
}

/* Build nav */
const nav=document.getElementById('nav');
PAGES.forEach(p=>{
  const btn=document.createElement('button');
  btn.className='nav-btn';
  btn.dataset.id=p.id;
  btn.innerHTML=`<span class="nav-icon">${p.icon}</span><span>${p.label}</span>`;
  btn.addEventListener('click',()=>navigate(p.id));
  nav.appendChild(btn);
});

/* ═══ Copilot ═══ */
document.getElementById('cp-btn').addEventListener('click',runCopilot);
document.getElementById('cp-input').addEventListener('keydown',e=>{if(e.key==='Enter')runCopilot();});
async function runCopilot(){
  const inp=document.getElementById('cp-input');
  const cmd=inp.value.trim();if(!cmd)return;
  const btn=document.getElementById('cp-btn');
  btn.disabled=true;btn.innerHTML='<span class="spin"></span>';
  try{
    await fetch('/api/copilot',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({command:cmd})});
    toast('🤖 الكوبيلوت يعالج طلبك...');
    inp.value='';
  }catch(e){toast(e.message,'err');}
  finally{btn.disabled=false;btn.textContent='⚡ تنفيذ';}
}

/* ═══ WebSocket ═══ */
function connectWS(){
  const proto=location.protocol==='https:'?'wss':'ws';
  const ws=new WebSocket(`${proto}://${location.host}/ws`);
  const dot=document.getElementById('ws-dot');
  const lbl=document.getElementById('ws-lbl');
  ws.onopen=()=>{dot.className='ws-dot on';lbl.textContent='متصل';};
  ws.onclose=()=>{dot.className='ws-dot off';lbl.textContent='غير متصل';setTimeout(connectWS,4000);};
  ws.onmessage=e=>{
    try{
      const d=JSON.parse(e.data);if(d.type==='ping')return;
      const MAP={copilot_result:'🤖 الكوبيلوت أنهى المهمة',campaign_done:'🚀 اكتملت الحملة',account_added:'✅ تمت إضافة حساب',group_joined:'👥 تم الانضمام',message_sent:'📨 تم إرسال رسالة'};
      if(MAP[d.type])toast(MAP[d.type]);
    }catch{}
  };
}
connectWS();

/* ═══ Start ═══ */
navigate('dashboard');
</script>
