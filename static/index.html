<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Telegram AI System</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.12.7/Recharts.umd.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0f1117;--card:#1a1d27;--card2:#22263a;--border:#2d3150;
    --accent:#6c63ff;--accent2:#4ade80;--danger:#f87171;--warn:#fbbf24;
    --text:#e2e8f0;--muted:#64748b;--white:#fff;
    --sidebar-w:220px;
  }
  body{font-family:'Segoe UI',Tahoma,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;direction:rtl}
  #root{display:flex;min-height:100vh}

  /* Sidebar */
  .sidebar{width:var(--sidebar-w);background:var(--card);border-left:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;right:0;bottom:0;z-index:100}
  .sidebar-logo{padding:20px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
  .sidebar-logo .logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),#a78bfa);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}
  .sidebar-logo span{font-weight:700;font-size:16px;color:var(--white)}
  .nav{flex:1;padding:12px 8px;overflow-y:auto}
  .nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;color:var(--muted);font-size:14px;transition:all .2s;margin-bottom:2px;user-select:none}
  .nav-item:hover{background:var(--card2);color:var(--text)}
  .nav-item.active{background:linear-gradient(135deg,rgba(108,99,255,.25),rgba(167,139,250,.15));color:var(--white);font-weight:600}
  .nav-item .icon{font-size:18px;width:22px;text-align:center}
  .nav-label{flex:1}

  /* Main */
  .main{margin-right:var(--sidebar-w);flex:1;display:flex;flex-direction:column;min-height:100vh}

  /* Topbar */
  .topbar{background:var(--card);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50}
  .topbar-title{font-size:17px;font-weight:700;color:var(--white);min-width:140px}
  .copilot-wrap{flex:1;display:flex;gap:8px;max-width:700px}
  .copilot-input{flex:1;background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:9px 16px;color:var(--text);font-size:14px;font-family:inherit;outline:none;transition:border-color .2s;direction:rtl}
  .copilot-input:focus{border-color:var(--accent)}
  .copilot-input::placeholder{color:var(--muted)}
  .btn{padding:9px 18px;border-radius:10px;border:none;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;transition:all .2s;white-space:nowrap}
  .btn-primary{background:linear-gradient(135deg,var(--accent),#a78bfa);color:#fff}
  .btn-primary:hover{opacity:.9;transform:translateY(-1px)}
  .btn-success{background:linear-gradient(135deg,#059669,var(--accent2));color:#fff}
  .btn-danger{background:linear-gradient(135deg,#dc2626,var(--danger));color:#fff}
  .btn-ghost{background:var(--card2);color:var(--text);border:1px solid var(--border)}
  .btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
  .btn-sm{padding:6px 12px;font-size:12px}
  .ws-dot{width:8px;height:8px;border-radius:50%;background:var(--accent2)}
  .ws-dot.off{background:var(--danger)}

  /* Content */
  .content{padding:24px;flex:1;overflow-y:auto}
  .page-header{margin-bottom:20px;display:flex;align-items:center;justify-content:space-between}
  .page-title{font-size:22px;font-weight:800;color:var(--white)}
  .page-sub{font-size:13px;color:var(--muted);margin-top:2px}

  /* Cards */
  .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px}
  .card-sm{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px}
  .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:20px}
  .stat-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;display:flex;align-items:center;gap:16px}
  .stat-icon{width:50px;height:50px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
  .stat-body{flex:1}
  .stat-val{font-size:26px;font-weight:800;color:var(--white)}
  .stat-label{font-size:12px;color:var(--muted);margin-top:2px}
  .stat-change{font-size:11px;color:var(--accent2);margin-top:3px}

  /* Grid */
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
  @media(max-width:900px){.grid2,.grid3{grid-template-columns:1fr}}

  /* Table */
  .table-wrap{overflow-x:auto;border-radius:12px;border:1px solid var(--border)}
  table{width:100%;border-collapse:collapse;font-size:13px}
  thead th{background:var(--card2);padding:12px 14px;text-align:right;color:var(--muted);font-weight:600;border-bottom:1px solid var(--border)}
  tbody td{padding:11px 14px;border-bottom:1px solid rgba(45,49,80,.5);vertical-align:middle}
  tbody tr:hover{background:rgba(108,99,255,.05)}
  tbody tr:last-child td{border-bottom:none}

  /* Badge */
  .badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
  .badge-green{background:rgba(74,222,128,.15);color:var(--accent2)}
  .badge-red{background:rgba(248,113,113,.15);color:var(--danger)}
  .badge-yellow{background:rgba(251,191,36,.15);color:var(--warn)}
  .badge-purple{background:rgba(108,99,255,.15);color:#a78bfa}
  .badge-blue{background:rgba(96,165,250,.15);color:#60a5fa}
  .badge-gray{background:rgba(100,116,139,.15);color:var(--muted)}

  /* Filter bar */
  .filter-bar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
  .filter-input{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:8px 14px;color:var(--text);font-size:13px;font-family:inherit;outline:none;min-width:160px}
  .filter-input:focus{border-color:var(--accent)}
  select.filter-input{cursor:pointer}

  /* Form */
  .form-group{margin-bottom:16px}
  .form-label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px}
  .form-input{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-size:14px;font-family:inherit;outline:none;transition:border-color .2s}
  .form-input:focus{border-color:var(--accent)}
  textarea.form-input{min-height:100px;resize:vertical}

  /* Modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px}
  .modal{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:28px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto}
  .modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
  .modal-title{font-size:18px;font-weight:700;color:var(--white)}
  .modal-close{background:var(--card2);border:1px solid var(--border);width:32px;height:32px;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:18px}

  /* Toast */
  .toast-container{position:fixed;bottom:24px;left:24px;z-index:9999;display:flex;flex-direction:column;gap:10px}
  .toast{background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:14px 18px;min-width:240px;display:flex;align-items:center;gap:10px;font-size:13px;box-shadow:0 8px 30px rgba(0,0,0,.4);animation:slideIn .3s ease}
  .toast.success{border-color:var(--accent2)}
  .toast.error{border-color:var(--danger)}
  @keyframes slideIn{from{transform:translateX(-30px);opacity:0}to{transform:translateX(0);opacity:1}}

  /* Progress */
  .progress-bar{height:6px;background:var(--card2);border-radius:4px;overflow:hidden}
  .progress-fill{height:100%;border-radius:4px;transition:width .5s ease}

  /* Empty state */
  .empty{text-align:center;padding:48px 20px;color:var(--muted)}
  .empty-icon{font-size:48px;margin-bottom:12px}

  /* Spinner */
  .spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* Section title */
  .section-title{font-size:15px;font-weight:700;color:var(--white);margin-bottom:12px;display:flex;align-items:center;gap:8px}
  .section-title span{font-size:13px;color:var(--muted);font-weight:400}
</style>
</head>
<body>
<div id="root"></div>
<script>
const {useState,useEffect,useRef,useCallback,createElement:h,Fragment}=React;
const {
  LineChart,Line,BarChart,Bar,PieChart,Pie,Cell,
  XAxis,YAxis,CartesianGrid,Tooltip,ResponsiveContainer,Legend
}=Recharts;

const API = '';  // same origin
const COLORS=['#6c63ff','#4ade80','#f87171','#fbbf24','#60a5fa','#f472b6'];

/* ══ helpers ══ */
async function apiFetch(path,opts={}){
  try{
    const r=await fetch(API+path,{headers:{'Content-Type':'application/json'},...opts});
    if(!r.ok)throw new Error(await r.text());
    return await r.json();
  }catch(e){console.error(path,e);throw e;}
}

/* ══ Toast system ══ */
let _addToast=()=>{};
function ToastContainer(){
  const[toasts,setToasts]=useState([]);
  _addToast=(msg,type='success')=>{
    const id=Date.now();
    setToasts(p=>[...p,{id,msg,type}]);
    setTimeout(()=>setToasts(p=>p.filter(t=>t.id!==id)),3500);
  };
  return h('div',{className:'toast-container'},
    toasts.map(t=>h('div',{key:t.id,className:`toast ${t.type}`},
      h('span',null,t.type==='success'?'✅':'❌'),t.msg
    ))
  );
}
const toast=(m,t)=>_addToast(m,t);

/* ══ Modal ══ */
function Modal({title,onClose,children}){
  return h('div',{className:'modal-overlay',onClick:e=>{if(e.target===e.currentTarget)onClose()}},
    h('div',{className:'modal'},
      h('div',{className:'modal-header'},
        h('span',{className:'modal-title'},title),
        h('button',{className:'modal-close',onClick:onClose},'×')
      ),
      children
    )
  );
}

/* ══ Badge ══ */
function Badge({label,type='gray'}){
  return h('span',{className:`badge badge-${type}`},label);
}

/* ══ StatCard ══ */
function StatCard({icon,label,value,change,color='#6c63ff'}){
  return h('div',{className:'stat-card'},
    h('div',{className:'stat-icon',style:{background:`${color}22`}},icon),
    h('div',{className:'stat-body'},
      h('div',{className:'stat-val'},value),
      h('div',{className:'stat-label'},label),
      change&&h('div',{className:'stat-change'},change),
    )
  );
}

/* ══ PAGES ══════════════════════════════════════════════════════════════════ */

/* Dashboard */
function Dashboard(){
  const[stats,setStats]=useState(null);
  const[timeline,setTimeline]=useState([]);
  const[categories,setCategories]=useState([]);
  const[bots,setBots]=useState([]);
  const[loading,setLoading]=useState(true);

  useEffect(()=>{
    Promise.all([
      apiFetch('/api/stats/overview'),
      apiFetch('/api/stats/messages_timeline'),
      apiFetch('/api/stats/groups_by_category'),
      apiFetch('/api/stats/protection_bots'),
    ]).then(([s,t,c,b])=>{
      setStats(s);setTimeline(t);setCategories(c);setBots(b);
    }).finally(()=>setLoading(false));
  },[]);

  if(loading)return h('div',{className:'content'},h('div',{className:'spinner'}));

  const s=stats||{accounts:{},groups:{},messages:{},campaigns:{}};
  return h('div',{className:'content'},
    h('div',{className:'page-header'},
      h('div',null,
        h('div',{className:'page-title'},'لوحة التحكم 📊'),
        h('div',{className:'page-sub'},'نظرة عامة على أداء النظام'),
      )
    ),
    h('div',{className:'stat-grid'},
      h(StatCard,{icon:'👤',label:'الحسابات النشطة',value:`${s.accounts.active||0}/${s.accounts.total||0}`,change:'↑ جاهزة للإرسال',color:'#6c63ff'}),
      h(StatCard,{icon:'👥',label:'المجموعات المنضم إليها',value:`${s.groups.joined||0}`,change:`من ${s.groups.total||0} مجموعة`,color:'#4ade80'}),
      h(StatCard,{icon:'📨',label:'الرسائل المرسلة',value:`${s.messages.total||0}`,change:`معدل نجاح ${s.messages.success_rate||0}%`,color:'#60a5fa'}),
      h(StatCard,{icon:'🗑',label:'رسائل محذوفة',value:`${s.messages.deleted||0}`,change:'تم تصنيفها تلقائياً',color:'#f87171'}),
    ),
    h('div',{className:'grid2',style:{marginBottom:16}},
      h('div',{className:'card'},
        h('div',{className:'section-title'},'📈 الرسائل اليومية'),
        timeline.length>0
          ? h(ResponsiveContainer,{width:'100%',height:200},
              h(LineChart,{data:timeline},
                h(CartesianGrid,{strokeDasharray:'3 3',stroke:'#2d3150'}),
                h(XAxis,{dataKey:'date',tick:{fill:'#64748b',fontSize:10}}),
                h(YAxis,{tick:{fill:'#64748b',fontSize:10}}),
                h(Tooltip,{contentStyle:{background:'#1a1d27',border:'1px solid #2d3150'}}),
                h(Line,{type:'monotone',dataKey:'count',stroke:'#6c63ff',strokeWidth:2,dot:false})
              )
            )
          : h('div',{className:'empty'},h('div',null,'لا توجد بيانات بعد'))
      ),
      h('div',{className:'card'},
        h('div',{className:'section-title'},'🏷 المجموعات حسب الفئة'),
        categories.length>0
          ? h(ResponsiveContainer,{width:'100%',height:200},
              h(PieChart,null,
                h(Pie,{data:categories,dataKey:'count',nameKey:'category',cx:'50%',cy:'50%',outerRadius:80,label:({category,percent})=>`${category} ${(percent*100).toFixed(0)}%`},
                  categories.map((_,i)=>h(Cell,{key:i,fill:COLORS[i%COLORS.length]}))
                ),
                h(Tooltip,{contentStyle:{background:'#1a1d27',border:'1px solid #2d3150'}})
              )
            )
          : h('div',{className:'empty'},h('div',null,'لا توجد بيانات'))
      )
    ),
    bots.length>0&&h('div',{className:'card'},
      h('div',{className:'section-title'},'🤖 بوتات الحماية المكتشفة'),
      h('div',{style:{display:'flex',gap:10,flexWrap:'wrap'}},
        bots.map((b,i)=>h('div',{key:i,className:'card-sm',style:{minWidth:120,textAlign:'center'}},
          h('div',{style:{fontSize:22}},b.bot==='سريع(<30ث)'?'⚡':'🛡'),
          h('div',{style:{fontWeight:700,fontSize:16,marginTop:4}},b.count),
          h('div',{style:{fontSize:12,color:'var(--muted)'}},b.bot),
        ))
      )
    )
  );
}

/* Groups */
function Groups(){
  const[groups,setGroups]=useState([]);
  const[loading,setLoading]=useState(true);
  const[search,setSearch]=useState('');
  const[catFilter,setCatFilter]=useState('');
  const[joinedFilter,setJoinedFilter]=useState('');
  const[showModal,setShowModal]=useState(false);
  const[editGroup,setEditGroup]=useState(null);

  const load=useCallback(()=>{
    setLoading(true);
    const params=new URLSearchParams();
    if(search)params.set('search',search);
    if(catFilter)params.set('category',catFilter);
    if(joinedFilter!=='')params.set('is_joined',joinedFilter);
    apiFetch(`/api/groups?${params}`).then(setGroups).finally(()=>setLoading(false));
  },[search,catFilter,joinedFilter]);

  useEffect(()=>{load()},[load]);

  async function syncDialogs(){
    const accountId=prompt('معرف الحساب للمزامنة:');
    if(!accountId)return;
    try{
      const r=await apiFetch('/api/groups/action',{method:'POST',body:JSON.stringify({action:'sync_dialogs',account_id:parseInt(accountId)})});
      toast(`تمت المزامنة: ${r.added} مجموعة جديدة`);
      load();
    }catch{toast('فشلت المزامنة','error')}
  }

  async function saveEdit(){
    try{
      await apiFetch('/api/groups/action',{method:'POST',body:JSON.stringify({action:'update',group_id:editGroup.id,data:{category:editGroup.category,sub_category:editGroup.sub_category,notes:editGroup.notes,tags:editGroup.tags||[]}})});
      toast('تم الحفظ');setShowModal(false);load();
    }catch{toast('فشل الحفظ','error')}
  }

  const cats=['تعليمي','تجاري','رياضي','ترفيهي','ديني','تقني','طبي','أخرى'];

  return h('div',{className:'content'},
    h('div',{className:'page-header'},
      h('div',null,
        h('div',{className:'page-title'},'المجموعات الموحدة 👥'),
        h('div',{className:'page-sub'},`${groups.length} مجموعة`),
      ),
      h('div',{style:{display:'flex',gap:8}},
        h('button',{className:'btn btn-ghost btn-sm',onClick:syncDialogs},'🔄 مزامنة الحوارات'),
        h('button',{className:'btn btn-primary btn-sm',onClick:()=>{setEditGroup({});setShowModal(true)}},'+ إضافة مجموعة'),
      )
    ),
    h('div',{className:'filter-bar'},
      h('input',{className:'filter-input',placeholder:'🔍 بحث...',value:search,onChange:e=>setSearch(e.target.value)}),
      h('select',{className:'filter-input',value:catFilter,onChange:e=>setCatFilter(e.target.value)},
        h('option',{value:''},'كل الفئات'),
        cats.map(c=>h('option',{key:c,value:c},c))
      ),
      h('select',{className:'filter-input',value:joinedFilter,onChange:e=>setJoinedFilter(e.target.value)},
        h('option',{value:''},'الحالة'),
        h('option',{value:'true'},'منضم'),
        h('option',{value:'false'},'غير منضم'),
      ),
      h('button',{className:'btn btn-ghost btn-sm',onClick:load},'تحديث'),
    ),
    loading?h('div',{className:'spinner'}):
    h('div',{className:'table-wrap'},
      h('table',null,
        h('thead',null,h('tr',null,
          h('th',null,'المجموعة'),h('th',null,'الأعضاء'),h('th',null,'الفئة'),
          h('th',null,'الحالة'),h('th',null,'بوت الحماية'),h('th',null,'إجراءات'),
        )),
        h('tbody',null,
          groups.length===0?h('tr',null,h('td',{colSpan:6,className:'empty'},'لا توجد مجموعات')):
          groups.map(g=>h('tr',{key:g.id},
            h('td',null,
              h('div',{style:{fontWeight:600,color:'var(--white)'}},g.title),
              g.username&&h('div',{style:{fontSize:11,color:'var(--muted)'}},`@${g.username}`)
            ),
            h('td',null,h('span',{style:{color:'var(--accent2)'}},g.member_count.toLocaleString())),
            h('td',null,g.category?h(Badge,{label:g.category,type:'purple'}):h('span',{style:{color:'var(--muted)'}},'-')),
            h('td',null,h(Badge,{label:g.is_joined?'منضم':'غير منضم',type:g.is_joined?'green':'gray'})),
            h('td',null,g.protection_bot?h(Badge,{label:g.protection_bot,type:'red'}):h('span',{style:{color:'var(--muted)'}},'-')),
            h('td',null,
              h('button',{className:'btn btn-ghost btn-sm',onClick:()=>{setEditGroup({...g});setShowModal(true)}},'✏️')
            ),
          ))
        )
      )
    ),
    showModal&&h(Modal,{title:editGroup?.id?'تعديل مجموعة':'إضافة مجموعة',onClose:()=>setShowModal(false)},
      !editGroup?.id&&h('div',{className:'form-group'},
        h('label',{className:'form-label'},'رابط المجموعة'),
        h('input',{className:'form-input',placeholder:'https://t.me/...',value:editGroup?.group_link||'',onChange:e=>setEditGroup(p=>({...p,group_link:e.target.value}))})
      ),
      h('div',{className:'form-group'},
        h('label',{className:'form-label'},'الفئة'),
        h('select',{className:'form-input',value:editGroup?.category||'',onChange:e=>setEditGroup(p=>({...p,category:e.target.value}))},
          h('option',{value:''},'اختر...'),
          cats.map(c=>h('option',{key:c,value:c},c))
        )
      ),
      h('div',{className:'form-group'},
        h('label',{className:'form-label'},'الفئة الفرعية'),
        h('input',{className:'form-input',value:editGroup?.sub_category||'',onChange:e=>setEditGroup(p=>({...p,sub_category:e.target.value}))})
      ),
      h('div',{className:'form-group'},
        h('label',{className:'form-label'},'ملاحظات'),
        h('textarea',{className:'form-input',value:editGroup?.notes||'',onChange:e=>setEditGroup(p=>({...p,notes:e.target.value}))})
      ),
      h('div',{style:{display:'flex',gap:8,justifyContent:'flex-end'}},
        h('button',{className:'btn btn-ghost',onClick:()=>setShowModal(false)},'إلغاء'),
        h('button',{className:'btn btn-primary',onClick:saveEdit},'حفظ'),
      )
    )
  );
}

/* Campaigns */
function Campaigns(){
  const[camps,setCamps]=useState([]);
  const[templates,setTemplates]=useState([]);
  const[loading,setLoading]=useState(true);
  const[showModal,setShowModal]=useState(false);

/* Accounts */
function Accounts(){
  const[accounts,setAccounts]=useState([]);
  const[showAdd,setShowAdd]=useState(false);
  const[phone,setPhone]=useState('');
  const[code,setCode]=useState('');

  const load=()=>apiFetch('/api/accounts').then(setAccounts);
  useEffect(()=>{load()},[]);

  async function sendCode(){
    if(!phone)return;
    setLoading(true);
    try{
      const r=await apiFetch('/api/accounts/add',{method:'POST',body:JSON.stringify({phone})});
      if(r.status==='code_sent'){setStep('code');toast('تم إرسال الكود 📱');}
      else toast(r.detail||'خطأ','error');
    }finally{setLoading(false)}
  }

  async function verify(){
    setLoading(true);

      const r=await apiFetch('/api/accounts/verify',{method:'POST',body:JSON.stringify({phone,code})});
      if(r.status==='ok'){toast('تم إضافة الحساب ✅');setShowAdd(false);setStep('phone');setPhone('');setCode('');load();}
      else toast(r.detail||'كود خاطئ','error');
    }finally{setLoading(false)}

    if(!confirm('حذف الحساب؟'))return;

        )),
        h('tbody',null,
          accounts.length===0?h('tr',null,h('td',{colSpan:5,className:'empty'},'لا توجد حسابات')):
          accounts.map(a=>h('tr',{key:a.id},
            h('td',null,h('span',{style:{fontWeight:600,color:'var(--white)'}},a.phone)),
            h('td',null,h(Badge,{label:a.status,type:statusColor[a.status]||'gray'})),
            h('td',null,
              h('div',{style:{display:'flex',alignItems:'center',gap:8}},
                h('div',{className:'progress-bar',style:{flex:1,maxWidth:80}},
                  h('div',{className:'progress-fill',style:{width:`${a.health_score}%`,background:a.health_score>70?'var(--accent2)':a.health_score>40?'var(--warn)':'var(--danger)'}})

                h('span',{style:{fontSize:12}},`${a.health_score}%`)
              )
            ),
            h('td',null,h('span',{style:{fontSize:12,color:'var(--muted)'}},a.last_active?new Date(a.last_active).toLocaleString('ar'):'—')),
            h('td',null,h('button',{className:'btn btn-danger btn-sm',onClick:()=>del(a.id)},'🗑')),
          ))
        )
      )
    ),
    showAdd&&h(Modal,{title:'إضافة حساب تيليجرام',onClose:()=>setShowAdd(false)},
      step==='phone'
        ? h(Fragment,null,
            h('div',{className:'form-group'},

            h('button',{className:'btn btn-primary',style:{width:'100%'},onClick:sendCode,disabled:loading},

/* ══ MAIN APP ════════════════════════════════════════════════════════════════ */
const PAGES=[
  {id:'dashboard', icon:'📊', label:'لوحة التحكم',   comp:Dashboard},
  {id:'groups',    icon:'👥', label:'المجموعات',      comp:Groups},
  {id:'campaigns', icon:'🚀', label:'الحملات',        comp:Campaigns},
  {id:'analytics', icon:'📈', label:'التحليلات',      comp:Analytics},
  {id:'accounts',  icon:'👤', label:'الحسابات',       comp:Accounts},
  {id:'templates', icon:'📝', label:'القوالب',        comp:Templates},
  {id:'audit',     icon:'📋', label:'سجل التدقيق',   comp:AuditLogPage},
  {id:'settings',  icon:'⚙️', label:'الإعدادات',     comp:Settings},
];

function App(){
  const[page,setPage]=useState('dashboard');
  const[copilot,setCopilot]=useState('');
  const[wsConn,setWsConn]=useState(false);
  const[copilotRunning,setCopilotRunning]=useState(false);
  const[notifications,setNotifications]=useState([]);
  const wsRef=useRef(null);

  // WebSocket
  useEffect(()=>{
    function connect(){
      const ws=new WebSocket(`ws://${location.host}/ws`);
      wsRef.current=ws;
      ws.onopen=()=>setWsConn(true);
      ws.onclose=()=>{setWsConn(false);setTimeout(connect,3000)};
      ws.onmessage=e=>{
        const d=JSON.parse(e.data);
        if(d.type==='ping')return;
        const msg={
          copilot_result:'🤖 الكوبيلوت أنهى المهمة',
          campaign_done:'🚀 اكتملت الحملة',
          account_added:'✅ تمت إضافة حساب',
          group_joined:'👥 تم الانضمام لمجموعة',
          message_sent:'📨 تم إرسال رسالة',
        }[d.type];
        if(msg){toast(msg);setNotifications(p=>[{id:Date.now(),text:msg,type:d.type},...p.slice(0,9)]);}
        if(d.type==='copilot_result')setCopilotRunning(false);
      };
    }
    connect();
    return()=>{wsRef.current?.close()};
  },[]);

  async function runCopilot(){
    if(!copilot.trim())return;
    setCopilotRunning(true);
    try{
      await fetch('/api/copilot',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({command:copilot})});
      toast('🤖 الكوبيلوت يعمل...');
      setCopilot('');
    }catch{toast('فشل الاتصال','error');setCopilotRunning(false)}
  }

  const ActivePage=(PAGES.find(p=>p.id===page)||PAGES[0]).comp;

  return h(Fragment,null,
    // Sidebar
    h('div',{className:'sidebar'},
      h('div',{className:'sidebar-logo'},
        h('div',{className:'logo-icon'},'🤖'),
        h('span',null,'TG AI System')
      ),
      h('nav',{className:'nav'},
        PAGES.map(p=>h('div',{key:p.id,className:`nav-item${page===p.id?' active':''}`,onClick:()=>setPage(p.id)},
          h('span',{className:'icon'},p.icon),
          h('span',{className:'nav-label'},p.label),
        ))
      )
    ),
    // Main
    h('div',{className:'main'},
      h('div',{className:'topbar'},
        h('span',{className:'topbar-title'},(PAGES.find(p=>p.id===page)||PAGES[0]).label),
        h('div',{className:'copilot-wrap'},
          h('input',{className:'copilot-input',placeholder:'🤖 أكتب أمراً... مثال: انشر الإعلان في المجموعات التعليمية',value:copilot,onChange:e=>setCopilot(e.target.value),onKeyDown:e=>e.key==='Enter'&&runCopilot()}),
          h('button',{className:'btn btn-primary',onClick:runCopilot,disabled:copilotRunning},
            copilotRunning?h('span',{className:'spinner'}):' تنفيذ'
          ),
        ),
        h('div',{style:{display:'flex',alignItems:'center',gap:8}},
          h('div',{className:`ws-dot${wsConn?'':' off'}`,title:wsConn?'متصل':'غير متصل'}),
          h('span',{style:{fontSize:12,color:'var(--muted)'}},wsConn?'متصل':'غير متصل'),
        )
      ),
      h(ActivePage,null)
    ),
    h(ToastContainer,null)
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App,null));
</script>
