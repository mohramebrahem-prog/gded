<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>النظام يعمل ✅</title>
    <style>
        body {
            margin: 0;
            background: #0f1117;
            color: #e2e8f0;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            direction: rtl;
        }
        .card {
            background: #1a1d27;
            border: 1px solid #2d3150;
            border-radius: 20px;
            padding: 40px 30px;
            max-width: 500px;
            margin: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 {
            color: #6c63ff;
            margin-bottom: 10px;
        }
        p {
            color: #64748b;
            margin-bottom: 30px;
        }
        .status {
            display: inline-block;
            background: #4ade80;
            color: #0f1117;
            padding: 6px 14px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .info {
            background: #22263a;
            padding: 15px;
            border-radius: 12px;
            text-align: right;
            margin-top: 20px;
        }
        .info-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
        }
        .info-label {
            color: #64748b;
        }
        .info-value {
            color: #e2e8f0;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="card">
        <span class="status">✅ الخادم يعمل</span>
        <h1>Telegram AI System</h1>
        <p>تم تحميل الصفحة بنجاح. واجهة React قيد الإعداد.</p>
        
        <div class="info">
            <div class="info-item">
                <span class="info-label">المنصة:</span>
                <span class="info-value">Railway</span>
            </div>
            <div class="info-item">
                <span class="info-label">آخر نشر:</span>
                <span class="info-value" id="time"></span>
            </div>
        </div>
        <p style="margin-top: 20px; font-size: 13px;">إذا ظهرت هذه الرسالة، فالمشكلة كانت في تحميل React وسيتم إصلاحها قريباً.</p>
    </div>
    <script>
        document.getElementById('time').textContent = new Date().toLocaleString('ar-SA');
    </script>
</body>
</html>
