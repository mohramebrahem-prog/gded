<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TG AI System – لوحة التحكم</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080c14;--card:#0f1520;--card2:#151d2e;
  --border:#1e2d47;--border2:#253552;
  --accent:#3b82f6;--accent2:#22c55e;--warn:#f59e0b;--danger:#ef4444;--purple:#8b5cf6;--teal:#14b8a6;
  --text:#c8d6e8;--muted:#5a7291;--white:#e8f0f8;--sw:230px;--topbar:56px;
}
html,body{height:100%;overflow:hidden;font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);font-size:14px}
#app{display:flex;height:100vh;overflow:hidden}

/* sidebar */
.sidebar{width:var(--sw);background:var(--card);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;transition:width .25s}
.sidebar.collapsed{width:52px}
.sidebar.collapsed .logo-text,.sidebar.collapsed .logo-sub,.sidebar.collapsed .nav-lbl{display:none}
.sidebar.collapsed .nav-btn{justify-content:center;padding:10px}
.logo{padding:14px 12px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);flex-shrink:0}
.logo-icon{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,#1d4ed8,#7c3aed);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.logo-text{font-size:14px;font-weight:800;color:var(--white)}
.logo-sub{font-size:10px;color:var(--muted);margin-top:1px}
nav{padding:10px 6px;flex:1}
.nav-section{font-size:10px;color:var(--muted);padding:10px 8px 4px;font-weight:700;text-transform:uppercase;letter-spacing:.05em}
.sidebar.collapsed .nav-section{display:none}
.nav-btn{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:8px;cursor:pointer;color:var(--muted);font-size:13px;font-weight:600;transition:all .15s;margin-bottom:1px;width:100%;background:none;border:none;text-align:right;font-family:'Cairo',sans-serif;white-space:nowrap}
.nav-btn:hover{background:var(--card2);color:var(--text)}
.nav-btn.active{background:linear-gradient(135deg,rgba(59,130,246,.25),rgba(139,92,246,.12));color:var(--white);border:1px solid rgba(59,130,246,.2)}
.nav-icon{width:20px;text-align:center;font-size:15px;flex-shrink:0}
.nav-lbl{flex:1}
.sidebar-footer{padding:10px 8px;border-top:1px solid var(--border);flex-shrink:0}

/* main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:var(--card);border-bottom:1px solid var(--border);height:var(--topbar);padding:0 14px;display:flex;align-items:center;gap:8px;flex-shrink:0}
.topbar-title{font-size:15px;font-weight:800;color:var(--white);white-space:nowrap;min-width:fit-content}
.cp-wrap{flex:1;max-width:520px;display:flex;gap:6px}
.cp-input{flex:1;background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:7px 12px;color:var(--text);font-size:12px;font-family:'Cairo',sans-serif;outline:none;direction:rtl;min-width:0}
.cp-input:focus{border-color:var(--accent)}
.cp-input::placeholder{color:var(--muted)}
.cp-status{font-size:11px;color:var(--muted);padding:4px 10px;background:var(--card2);border:1px solid var(--border);border-radius:6px;white-space:nowrap}
.ws-pill{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);padding:4px 9px;border-radius:20px;background:var(--card2);border:1px solid var(--border);white-space:nowrap}
.ws-dot{width:7px;height:7px;border-radius:50%;background:#374151}
.ws-dot.on{background:var(--accent2);box-shadow:0 0 6px var(--accent2)}
#content{flex:1;overflow-y:auto;padding:18px 20px;background:var(--bg)}

/* buttons */
.btn{padding:7px 14px;border-radius:7px;border:none;cursor:pointer;font-family:'Cairo',sans-serif;font-size:12px;font-weight:700;transition:all .15s;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-primary{background:linear-gradient(135deg,#1d4ed8,#2563eb);color:#fff}
.btn-primary:hover:not(:disabled){opacity:.88}
.btn-success{background:linear-gradient(135deg,#15803d,#16a34a);color:#fff}
.btn-success:hover:not(:disabled){opacity:.88}
.btn-danger{background:linear-gradient(135deg,#b91c1c,#dc2626);color:#fff}
.btn-danger:hover:not(:disabled){opacity:.88}
.btn-warn{background:linear-gradient(135deg,#b45309,#d97706);color:#fff}
.btn-warn:hover:not(:disabled){opacity:.88}
.btn-purple{background:linear-gradient(135deg,#6d28d9,#7c3aed);color:#fff}
.btn-purple:hover:not(:disabled){opacity:.88}
.btn-ghost{background:var(--card2);color:var(--text);border:1px solid var(--border)}
.btn-ghost:hover:not(:disabled){border-color:var(--accent);color:var(--accent)}
.btn-sm{padding:6px 11px;font-size:12px;border-radius:6px}
.btn-xs{padding:4px 8px;font-size:11px;border-radius:5px}
.btn-icon{padding:6px;border-radius:6px;background:var(--card2);border:1px solid var(--border);cursor:pointer;color:var(--muted);font-size:13px;display:inline-flex;align-items:center;justify-content:center;transition:all .15s;line-height:1;font-family:inherit}
.btn-icon:hover{border-color:var(--accent);color:var(--accent)}

/* cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:14px}
.card-sm{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 14px}
.page-hdr{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.page-title{font-size:20px;font-weight:900;color:var(--white)}
.page-sub{font-size:12px;color:var(--muted);margin-top:3px}

/* kpi */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:10px;margin-bottom:14px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;position:relative;overflow:hidden;transition:border-color .2s,transform .15s;cursor:default}
.kpi:hover{border-color:var(--border2);transform:translateY(-1px)}
.kpi-glow{position:absolute;top:-20px;right:-20px;width:80px;height:80px;border-radius:50%;opacity:.07;filter:blur(18px)}
.kpi-icon{font-size:20px;margin-bottom:8px}
.kpi-val{font-size:26px;font-weight:900;color:var(--white);line-height:1}
.kpi-lbl{font-size:11px;color:var(--muted);margin-top:4px}
.kpi-chg{font-size:11px;margin-top:3px}
.kpi-chg.up{color:var(--accent2)}.kpi-chg.down{color:var(--danger)}.kpi-chg.warn{color:var(--warn)}.kpi-chg.info{color:var(--accent)}

/* grids */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.grid4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px}
@media(max-width:1000px){.grid3{grid-template-columns:1fr 1fr}.grid4{grid-template-columns:1fr 1fr}}
@media(max-width:680px){.grid2,.grid3,.grid4{grid-template-columns:1fr}}

/* tables */
.tbl-wrap{overflow-x:auto;border-radius:10px;border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{background:var(--card2);padding:9px 12px;text-align:right;color:var(--muted);font-weight:700;border-bottom:1px solid var(--border);white-space:nowrap;font-size:11px}
tbody tr{border-bottom:1px solid var(--border);transition:background .15s}
tbody tr:hover{background:rgba(59,130,246,.04)}
tbody tr:last-child{border-bottom:none}
td{padding:9px 12px;vertical-align:middle}
.td-name{font-weight:700;color:var(--white)}
.td-sub{font-size:11px;color:var(--muted);margin-top:1px}

/* badges */
.badge{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:5px;font-size:11px;font-weight:700;white-space:nowrap}
.badge-green{background:rgba(34,197,94,.12);color:#4ade80;border:1px solid rgba(34,197,94,.2)}
.badge-red{background:rgba(239,68,68,.12);color:#f87171;border:1px solid rgba(239,68,68,.2)}
.badge-yellow{background:rgba(245,158,11,.12);color:#fbbf24;border:1px solid rgba(245,158,11,.2)}
.badge-blue{background:rgba(59,130,246,.12);color:#60a5fa;border:1px solid rgba(59,130,246,.2)}
.badge-purple{background:rgba(139,92,246,.12);color:#a78bfa;border:1px solid rgba(139,92,246,.2)}
.badge-gray{background:rgba(107,114,128,.12);color:#9ca3af;border:1px solid rgba(107,114,128,.2)}
.badge-teal{background:rgba(20,184,166,.12);color:#2dd4bf;border:1px solid rgba(20,184,166,.2)}
.badge-orange{background:rgba(249,115,22,.12);color:#fb923c;border:1px solid rgba(249,115,22,.2)}

/* forms */
.fg{margin-bottom:12px}
.flbl{display:block;font-size:11px;color:var(--muted);margin-bottom:5px;font-weight:700}
.finput{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:7px;padding:8px 11px;color:var(--text);font-size:13px;font-family:'Cairo',sans-serif;outline:none;transition:border-color .2s}
.finput:focus{border-color:var(--accent)}
.fselect{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:7px;padding:8px 11px;color:var(--text);font-size:13px;font-family:'Cairo',sans-serif;outline:none;cursor:pointer}
.ftextarea{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:7px;padding:8px 11px;color:var(--text);font-size:13px;font-family:'Cairo',sans-serif;outline:none;resize:vertical;min-height:80px}

/* modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px;backdrop-filter:blur(3px)}
.modal{background:var(--card);border:1px solid var(--border2);border-radius:14px;padding:22px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.modal-title{font-size:16px;font-weight:800;color:var(--white)}
.modal-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;line-height:1;padding:4px}
.modal-close:hover{color:var(--text)}
.modal-foot{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;padding-top:14px;border-top:1px solid var(--border)}

/* tabs */
.tabs{display:flex;gap:4px;margin-bottom:16px;border-bottom:1px solid var(--border);padding-bottom:0}
.tab{padding:8px 14px;border-radius:8px 8px 0 0;cursor:pointer;font-size:13px;font-weight:700;color:var(--muted);background:none;border:none;font-family:'Cairo',sans-serif;transition:all .15s;border-bottom:2px solid transparent;margin-bottom:-1px}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* progress */
.progress{background:var(--card2);border-radius:99px;height:6px;overflow:hidden;width:100%}
.progress-bar{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent),var(--purple));transition:width .3s}

/* alerts */
.alert{padding:10px 14px;border-radius:8px;font-size:12px;margin-bottom:10px;display:flex;gap:8px;align-items:flex-start}
.alert-info{background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.2);color:#93c5fd}
.alert-warn{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.2);color:#fcd34d}
.alert-danger{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:#fca5a5}
.alert-success{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.2);color:#86efac}

/* chart container */
.chart-wrap{position:relative;height:200px}
.chart-wrap-lg{position:relative;height:260px}

/* filter bar */
.filter-bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
.filter-bar .finput,.filter-bar .fselect{width:auto;min-width:130px}

/* toast */
#toast-container{position:fixed;bottom:20px;left:20px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{padding:10px 16px;border-radius:8px;font-size:13px;font-weight:600;color:#fff;animation:slideIn .2s ease;min-width:220px}
.toast-success{background:#15803d}
.toast-error{background:#b91c1c}
.toast-info{background:#1d4ed8}
@keyframes slideIn{from{transform:translateX(-20px);opacity:0}to{transform:translateX(0);opacity:1}}

/* empty state */
.empty-state{text-align:center;padding:50px 20px;color:var(--muted)}
.empty-state .es-icon{font-size:40px;margin-bottom:10px;opacity:.4}
.empty-state p{font-size:13px}

/* spinner */
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="app">
  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="logo">
      <div class="logo-icon">🤖</div>
      <div>
        <div class="logo-text">TG AI System</div>
        <div class="logo-sub">الموظف الافتراضي</div>
      </div>
    </div>
    <nav>
      <div class="nav-section">الرئيسية</div>
      <button class="nav-btn active" onclick="navigate('dashboard')"><span class="nav-icon">🏠</span><span class="nav-lbl">لوحة التحكم</span></button>

      <div class="nav-section">الإدارة</div>
      <button class="nav-btn" onclick="navigate('groups')"><span class="nav-icon">👥</span><span class="nav-lbl">المجموعات</span></button>
      <button class="nav-btn" onclick="navigate('campaigns')"><span class="nav-icon">📢</span><span class="nav-lbl">الحملات</span></button>
      <button class="nav-btn" onclick="navigate('templates')"><span class="nav-icon">📝</span><span class="nav-lbl">صيغ الإعلانات</span></button>

      <div class="nav-section">الحسابات</div>
      <button class="nav-btn" onclick="navigate('accounts')"><span class="nav-icon">📱</span><span class="nav-lbl">الحسابات</span></button>
      <button class="nav-btn" onclick="navigate('proxies')"><span class="nav-icon">🌐</span><span class="nav-lbl">البروكسيات</span></button>

      <div class="nav-section">التحليلات</div>
      <button class="nav-btn" onclick="navigate('analytics')"><span class="nav-icon">📊</span><span class="nav-lbl">التحليلات</span></button>
      <button class="nav-btn" onclick="navigate('audit')"><span class="nav-icon">📋</span><span class="nav-lbl">سجل الأحداث</span></button>
    </nav>
    <div class="sidebar-footer">
      <button class="nav-btn" onclick="navigate('settings')"><span class="nav-icon">⚙️</span><span class="nav-lbl">الإعدادات</span></button>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <button class="btn-icon" onclick="toggleSidebar()" title="القائمة">☰</button>
      <div class="topbar-title" id="topbar-title">لوحة التحكم</div>
      <div class="cp-wrap">
        <input class="cp-input" id="cp-input" placeholder="💬 أمر مباشر... (مثال: أوقف حملة 1)" onkeydown="cpKeydown(event)">
        <button class="btn btn-primary btn-sm" onclick="sendCopilot()">▶</button>
      </div>
      <div class="cp-status" id="cp-status" style="display:none">⏳ جاري...</div>
      <div class="ws-pill"><div class="ws-dot" id="ws-dot"></div><span id="ws-lbl">غير متصل</span></div>
    </div>
    <div id="content"></div>
  </div>
</div>

<div id="toast-container"></div>

<script>
// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
const state = {
  page: 'dashboard',
  stats: {},
  ws: null,
  charts: {},
  analyticsTab: 'overview',
};

// ═══════════════════════════════════════════════════════════
// WEBSOCKET
// ═══════════════════════════════════════════════════════════
function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  state.ws = new WebSocket(`${proto}://${location.host}/ws`);
  state.ws.onopen = () => {
    document.getElementById('ws-dot').classList.add('on');
    document.getElementById('ws-lbl').textContent = 'متصل';
  };
  state.ws.onclose = () => {
    document.getElementById('ws-dot').classList.remove('on');
    document.getElementById('ws-lbl').textContent = 'غير متصل';
    setTimeout(connectWS, 4000);
  };
  state.ws.onmessage = e => {
    const d = JSON.parse(e.data);
    if (d.type === 'ping') return;
    if (d.type === 'copilot_result') {
      document.getElementById('cp-status').style.display = 'none';
      toast(d.data?.result || 'تم التنفيذ', 'success');
    } else if (d.type === 'account_added') toast(`✅ حساب ${d.phone} أُضيف`, 'success');
    else if (d.type === 'group_joined') toast(`✅ انضممت لـ ${d.title}`, 'success');
    else if (d.type === 'groups_synced') toast(`🔄 مزامنة: ${d.added} مجموعة جديدة`, 'info');
    else if (d.type === 'message_sent') toast(`📨 رسالة لـ ${d.group}`, 'info');
    else if (d.type === 'campaign_done') toast(`✅ الحملة ${d.id} اكتملت`, 'success');
    // refresh current page stats
    if (['account_added','groups_synced','message_sent','campaign_done'].includes(d.type)) {
      if (state.page === 'dashboard') renderDashboard();
    }
  };
}

// ═══════════════════════════════════════════════════════════
// API
// ═══════════════════════════════════════════════════════════
async function api(path, method='GET', body=null) {
  const opts = { method, headers: {'Content-Type':'application/json'} };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(path, opts);
  if (!r.ok) {
    const err = await r.json().catch(()=>({detail: r.statusText}));
    throw new Error(err.detail || r.statusText);
  }
  return r.json();
}

// ═══════════════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════════════
function toast(msg, type='info') {
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

// ═══════════════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════════════
const pageTitles = {
  dashboard:'لوحة التحكم', groups:'المجموعات الموحدة',
  campaigns:'الحملات الإعلانية', templates:'صيغ الإعلانات',
  accounts:'الحسابات', proxies:'البروكسيات',
  analytics:'التحليلات', audit:'سجل الأحداث', settings:'الإعدادات'
};
function navigate(page) {
  state.page = page;
  document.getElementById('topbar-title').textContent = pageTitles[page] || page;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => {
    if (b.getAttribute('onclick') === `navigate('${page}')`) b.classList.add('active');
  });
  // destroy charts
  Object.values(state.charts).forEach(c => { try { c.destroy(); } catch{} });
  state.charts = {};
  const fn = { dashboard:renderDashboard, groups:renderGroups, campaigns:renderCampaigns,
    templates:renderTemplates, accounts:renderAccounts, proxies:renderProxies,
    analytics:renderAnalytics, audit:renderAudit, settings:renderSettings }[page];
  if (fn) fn();
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('collapsed');
}

// ═══════════════════════════════════════════════════════════
// COPILOT
// ═══════════════════════════════════════════════════════════
function cpKeydown(e) { if (e.key === 'Enter') sendCopilot(); }
async function sendCopilot() {
  const inp = document.getElementById('cp-input');
  const cmd = inp.value.trim();
  if (!cmd) return;
  inp.value = '';
  document.getElementById('cp-status').style.display = 'flex';
  try { await api('/api/copilot', 'POST', {command: cmd}); }
  catch(e) { toast('خطأ: ' + e.message, 'error'); document.getElementById('cp-status').style.display='none'; }
}

// ═══════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════
const statusBadge = s => {
  const m = {active:'badge-green',pending:'badge-yellow',banned:'badge-red',flood:'badge-orange',draft:'badge-gray',running:'badge-blue',paused:'badge-yellow',done:'badge-green'};
  const l = {active:'نشط',pending:'بانتظار',banned:'محظور',flood:'محدود',draft:'مسودة',running:'يعمل',paused:'موقوف',done:'منتهية'};
  return `<span class="badge ${m[s]||'badge-gray'}">${l[s]||s}</span>`;
};
const protBadge = p => {
  if (!p) return '<span class="badge badge-green">لا يوجد</span>';
  const m = {'جبل':'badge-red','الماسة':'badge-purple','سريع(<30ث)':'badge-red','بطيء':'badge-yellow'};
  return `<span class="badge ${m[p]||'badge-orange'}">⚡ ${p}</span>`;
};
const actBadge = a => {
  const m = {high:'badge-green',medium:'badge-yellow',low:'badge-orange',dead:'badge-red',unknown:'badge-gray'};
  const l = {high:'عالي',medium:'متوسط',low:'منخفض',dead:'ميت',unknown:'غير معروف'};
  return `<span class="badge ${m[a]||'badge-gray'}">${l[a]||a}</span>`;
};
const catBadge = c => c ? `<span class="badge badge-blue">${c}</span>` : '<span class="badge badge-gray">—</span>';
const fmt = n => n == null ? '—' : Number(n).toLocaleString('ar');
const pct = (a,b) => b ? Math.round(a/b*100)+'%' : '0%';
function mkChart(id, type, labels, datasets, opts={}) {
  const ctx = document.getElementById(id);
  if (!ctx) return null;
  if (state.charts[id]) { state.charts[id].destroy(); }
  const dark = {color:'#5a7291', grid:{color:'rgba(30,45,71,.6)'}};
  const cfg = { type, data:{labels, datasets},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{color:'#5a7291',font:{family:'Cairo',size:11}},...(opts.legend||{})}},
      scales: type!=='pie'&&type!=='doughnut' ? {x:{ticks:dark,grid:dark},y:{ticks:dark,grid:dark}} : undefined,
      ...opts.extra} };
  state.charts[id] = new Chart(ctx, cfg);
  return state.charts[id];
}

let _gDebTimer;
function debounceGroups() { clearTimeout(_gDebTimer); _gDebTimer = setTimeout(applyGroupFilters, 400); }
function applyGroupFilters() {
  renderGroups({
    search: document.getElementById('g-search')?.value||'',
    category: document.getElementById('g-cat')?.value||'',
    is_joined: document.getElementById('g-joined')?.value||undefined,
    protection_bot: document.getElementById('g-prot')?.value||'',
    activity_level: document.getElementById('g-act')?.value||'',
  });
}
async function toggleFav(id) {
  await api('/api/groups/action','POST',{action:'favorite',group_id:id});
  applyGroupFilters();
}
async function toggleBlacklist(id, current) {
  await api('/api/groups/action','POST',{action:current?'unblacklist':'blacklist',group_id:id});
  toast(current?'أُزيلت من القائمة السوداء':'أُضيفت للقائمة السوداء','info');
  applyGroupFilters();
}
async function leaveGroup(id) {
  if (!confirm('هل تريد مغادرة هذه المجموعة؟')) return;
  try { await api('/api/groups/action','POST',{action:'leave',group_id:id}); toast('تمت المغادرة','success'); applyGroupFilters(); }
  catch(e) { toast('خطأ: '+e.message,'error'); }
}

async function runCampaign(id) {
  try { await api(`/api/campaigns/${id}/run`,'POST'); toast('الحملة بدأت التشغيل','success'); renderCampaigns(); }
  catch(e) { toast('خطأ: '+e.message,'error'); }
}
async function pauseCampaign(id) {
  try { await api(`/api/campaigns/${id}/pause`,'POST'); toast('الحملة موقوفة','info'); renderCampaigns(); }
  catch(e) { toast('خطأ: '+e.message,'error'); }
}
async function deleteCampaign(id) {
  if (!confirm('حذف هذه الحملة؟')) return;
  try { await api(`/api/campaigns/${id}`,'DELETE'); toast('تم الحذف','success'); renderCampaigns(); }
  catch(e) { toast('خطأ: '+e.message,'error'); }
}
async function editCampaign(id) {
  const camp = (await api('/api/campaigns')).find(c=>c.id===id);
  if (!camp) return;
  showModal('تعديل الحملة', `
    <div class="fg"><label class="flbl">الاسم</label><input class="finput" id="ec-name" value="${camp.name}"></div>
    <div class="fg"><label class="flbl">القوالب (أرقام مفصولة بفاصلة)</label><input class="finput" id="ec-tmpl" value="${(camp.template_ids||[]).join(',')}"></div>
  `, async () => {
    const name = document.getElementById('ec-name').value.trim();
    const tmpl = document.getElementById('ec-tmpl').value.split(',').map(x=>parseInt(x.trim())).filter(Boolean);

    toast('تم التحديث','success'); renderCampaigns();
  });
}

function showModal(title, bodyHtml, onConfirm) {
  const ov = document.createElement('div');
  ov.className = 'modal-overlay';
  ov.innerHTML = `
  <div class="modal">
    <div class="modal-hdr">
      <div class="modal-title">${title}</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="modal-body">${bodyHtml}</div>
    <div class="modal-foot">
      <button class="btn btn-ghost btn-sm" onclick="closeModal()">إلغاء</button>
      ${onConfirm?`<button class="btn btn-primary btn-sm" id="modal-confirm">تأكيد</button>`:''}
    </div>
  </div>`;
  ov.id = 'modal-overlay';
  ov.addEventListener('click', e => { if (e.target === ov) closeModal(); });
  document.body.appendChild(ov);
  if (onConfirm) {
    document.getElementById('modal-confirm').onclick = async () => {
      try { await onConfirm(); closeModal(); }
      catch(e) { toast('خطأ: '+e.message,'error'); }
    };
  }
}
function closeModal() {
  document.getElementById('modal-overlay')?.remove();
}

  showModal('إضافة حساب تيليجرام', `
    <div class="alert alert-info">أدخل رقم الهاتف مع مفتاح الدولة (مثال: +966501234567)</div>
    <div class="fg"><label class="flbl">رقم الهاتف</label><input class="finput" id="aa-phone" placeholder="+966..."></div>
    <div id="aa-code-section" style="display:none">
      <div class="alert alert-warn">📲 تم إرسال كود التحقق، أدخله هنا</div>
      <div class="fg"><label class="flbl">كود التحقق</label><input class="finput" id="aa-code" placeholder="12345"></div>
      <div class="fg"><label class="flbl">كلمة المرور (إن وجدت)</label><input class="finput" type="password" id="aa-pass" placeholder="اختياري"></div>
    </div>
    <div id="aa-action">
      <button class="btn btn-primary" onclick="sendPhoneCode()">📨 إرسال الكود</button>
    </div>
  `, null);
}

async function sendPhoneCode() {
  const phone = document.getElementById('aa-phone')?.value?.trim();
  if (!phone) { toast('أدخل رقم الهاتف','error'); return; }
  try {
    const r = await api('/api/accounts/add','POST',{phone});
    if (r.status === 'code_sent') {
      document.getElementById('aa-code-section').style.display='block';
      document.getElementById('aa-action').innerHTML=`<button class="btn btn-success" onclick="verifyPhoneCode('${phone}')">✅ تحقق من الكود</button>`;
      toast('تم إرسال الكود','success');
    } else toast('خطأ: '+(r.detail||r.status),'error');
  } catch(e) { toast('خطأ: '+e.message,'error'); }
}

async function verifyPhoneCode(phone) {
  const code = document.getElementById('aa-code')?.value?.trim();
  const pass = document.getElementById('aa-pass')?.value?.trim();
  if (!code) { toast('أدخل الكود','error'); return; }
  try {
    const r = await api('/api/accounts/verify','POST',{phone,code,password:pass||undefined});
    if (r.status === 'ok') { toast('✅ تم تفعيل الحساب!','success'); closeModal(); renderAccounts(); }
    else if (r.status === '2fa_required') toast('🔐 كلمة المرور مطلوبة','warn');
    else toast('خطأ: '+(r.detail||r.status),'error');
  } catch(e) { toast('خطأ: '+e.message,'error'); }
}

  showModal('الانضمام لمجموعة', `

// EDIT GROUP MODAL
async function showEditGroup(id) {
  const groups = await api('/api/groups');
  const g = groups.find(x=>x.id===id);
  if (!g) return;
  showModal('تعديل المجموعة', `
    <div class="fg"><label class="flbl">التصنيف</label>
      <select class="fselect" id="eg-cat">
        ${['تعليمي','تقني','تجاري','ترفيهي','إخباري','عام','إعلانات'].map(c=>`<option ${g.category===c?'selected':''}>${c}</option>`).join('')}
      </select>
    </div>
    <div class="fg"><label class="flbl">مستوى النشاط</label>
      <select class="fselect" id="eg-act">
        <option value="high" ${g.activity_level==='high'?'selected':''}>عالي</option>
        <option value="medium" ${g.activity_level==='medium'?'selected':''}>متوسط</option>
        <option value="low" ${g.activity_level==='low'?'selected':''}>منخفض</option>
        <option value="dead" ${g.activity_level==='dead'?'selected':''}>ميت</option>
      </select>
    </div>
    <div class="fg"><label class="flbl">نسبة الطلاب (0-1)</label><input class="finput" id="eg-sr" type="number" step="0.1" min="0" max="1" value="${g.student_ratio||0}"></div>
    <div class="fg"><label class="flbl">ملاحظات</label><input class="finput" id="eg-notes" value="${g.notes||''}"></div>
  `, async () => {
    await api('/api/groups/action','POST',{action:'update',group_id:id,data:{
      category: document.getElementById('eg-cat').value,
      activity_level: document.getElementById('eg-act').value,
      student_ratio: parseFloat(document.getElementById('eg-sr').value)||0,
      notes: document.getElementById('eg-notes').value,
    }});
    toast('تم التحديث','success'); applyGroupFilters();
  });
}

// SEND MSG MODAL
async function showSendMsg(groupId, groupTitle, accountId) {
  const tmpls = await api('/api/templates');
  showModal(`إرسال إعلان → ${groupTitle}`, `
    <div class="fg"><label class="flbl">رقم الحساب (ID)</label><input class="finput" id="sm-acc" type="number" value="${accountId||''}"></div>
    <div class="fg"><label class="flbl">اختر صيغة (اختياري)</label>
      <select class="fselect" id="sm-tmpl" onchange="fillMsgFromTemplate()">
        <option value="">— كتابة مباشرة —</option>
        ${tmpls.map(t=>`<option value="${t.id}" data-content="${t.base_content.replace(/"/g,'&quot;')}">${t.name}</option>`).join('')}
      </select>
    </div>
    <div class="fg"><label class="flbl">نص الرسالة</label><textarea class="ftextarea" id="sm-msg" style="min-height:100px"></textarea></div>
  `, async () => {
    const acc = parseInt(document.getElementById('sm-acc').value);
    const msg = document.getElementById('sm-msg').value.trim();
    if (!acc || !msg) throw new Error('أدخل جميع البيانات');
    await api('/api/messages/send','POST',{account_id:acc,group_id:groupId,message:msg});
    toast('الرسالة في قائمة الإرسال','success');
  });
}
function fillMsgFromTemplate() {
  const sel = document.getElementById('sm-tmpl');
  const opt = sel.selectedOptions[0];
  if (opt && opt.dataset.content) document.getElementById('sm-msg').value = opt.dataset.content;
}

// CREATE CAMPAIGN MODAL
async function showCreateCampaign() {
  const tmpls = await api('/api/templates');
  showModal('إنشاء حملة جديدة', `
    <div class="fg"><label class="flbl">اسم الحملة</label><input class="finput" id="cc-name" placeholder="حملة الطلاب"></div>
    <div class="fg"><label class="flbl">القوالب المستخدمة</label>
      <div style="max-height:140px;overflow-y:auto;background:var(--card2);border:1px solid var(--border);border-radius:7px;padding:8px">
        ${tmpls.map(t=>`<label style="display:flex;gap:8px;align-items:center;padding:4px 0;cursor:pointer;font-size:13px">
          <input type="checkbox" class="cc-tmpl-cb" value="${t.id}"> ${t.name}</label>`).join('')||'<span style="color:var(--muted);font-size:12px">لا توجد قوالب - أنشئ قوالب أولاً</span>'}
      </div>
    </div>
    <div class="fg"><label class="flbl">التصنيف المستهدف (اختياري)</label>
      <select class="fselect" id="cc-cat">
        <option value="">الكل</option>
        ${['تعليمي','تقني','تجاري','ترفيهي','عام'].map(c=>`<option>${c}</option>`).join('')}

// ADD PROXY MODAL
function showAddProxy() {
  showModal('إضافة بروكسي', `
    <div class="fg"><label class="flbl">التسمية</label><input class="finput" id="ap-label" placeholder="FR-01"></div>
    <div class="fg"><label class="flbl">النوع</label>
      <select class="fselect" id="ap-scheme"><option value="socks5">SOCKS5</option><option value="socks4">SOCKS4</option><option value="http">HTTP</option></select>
    </div>
    <div class="fg"><label class="flbl">الخادم (hostname)</label><input class="finput" id="ap-host" placeholder="proxy.example.com"></div>
    <div class="fg"><label class="flbl">المنفذ (port)</label><input class="finput" id="ap-port" type="number" placeholder="1080"></div>
    <div class="fg"><label class="flbl">اسم المستخدم (اختياري)</label><input class="finput" id="ap-user"></div>
    <div class="fg"><label class="flbl">كلمة المرور (اختياري)</label><input class="finput" type="password" id="ap-pass"></div>
    <div class="fg"><label class="flbl">البلد (مثال: SA)</label><input class="finput" id="ap-country" placeholder="SA"></div>
  `, async () => {
    const label = document.getElementById('ap-label').value.trim();
    const host  = document.getElementById('ap-host').value.trim();
    const port  = parseInt(document.getElementById('ap-port').value);
    if (!label || !host || !port) throw new Error('أدخل التسمية والخادم والمنفذ');
    await api('/api/proxies','POST',{
      label, scheme: document.getElementById('ap-scheme').value,
      hostname: host, port,
      username: document.getElementById('ap-user').value||null,
      password: document.getElementById('ap-pass').value||null,
      country: document.getElementById('ap-country').value||null,
    });
    toast('✅ تم إضافة البروكسي','success'); renderProxies();
  });
}

// CREATE TEMPLATE MODAL
function showCreateTemplate() {
  showModal('صيغة إعلانية جديدة', `
    <div class="fg"><label class="flbl">الاسم</label><input class="finput" id="ct-name" placeholder="صيغة الطالب الذكي"></div>
    <div class="fg"><label class="flbl">النص الأساسي</label><textarea class="ftextarea" id="ct-content" style="min-height:100px" placeholder="اكتب نص الإعلان هنا..."></textarea></div>
    <div class="fg"><label class="flbl">التشعبات (كل سطر = نسخة مختلفة)</label><textarea class="ftextarea" id="ct-vars" style="min-height:80px" placeholder="نسخة بديلة 1&#10;نسخة بديلة 2"></textarea></div>
  `, async () => {
    const name = document.getElementById('ct-name').value.trim();
    const content = document.getElementById('ct-content').value.trim();
    if (!name || !content) throw new Error('أدخل الاسم والنص');

    await api('/api/templates','POST',{name,base_content:content,variations:vars});

  });
