<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TG AI System – لوحة التحكم</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080c14;--card:#0f1520;--card2:#151d2e;
  --border:#1e2d47;--border2:#253552;
  --accent:#3b82f6;--accent2:#22c55e;--warn:#f59e0b;--danger:#ef4444;--purple:#8b5cf6;
  --text:#c8d6e8;--muted:#5a7291;--white:#e8f0f8;--sw:220px;--topbar:56px;
}
html,body{height:100%;overflow:hidden;font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);font-size:14px}
#app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:var(--sw);background:var(--card);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;transition:width .25s}
.sidebar.collapsed{width:56px}
.sidebar.collapsed .logo-text,.sidebar.collapsed .logo-sub,.sidebar.collapsed .nav-lbl,.sidebar.collapsed .sf-lbl{display:none}
.sidebar.collapsed .nav-btn{justify-content:center;padding:10px}
.logo{padding:14px 12px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);flex-shrink:0}
.logo-icon{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,#1d4ed8,#7c3aed);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.logo-text{font-size:14px;font-weight:800;color:var(--white)}
.logo-sub{font-size:10px;color:var(--muted);margin-top:1px}
nav{padding:10px 6px;flex:1}
.nav-btn{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:8px;cursor:pointer;color:var(--muted);font-size:13px;font-weight:600;transition:all .15s;margin-bottom:1px;width:100%;background:none;border:none;text-align:right;font-family:'Cairo',sans-serif;white-space:nowrap}
.nav-btn:hover{background:var(--card2);color:var(--text)}
.nav-btn.active{background:linear-gradient(135deg,rgba(59,130,246,.25),rgba(139,92,246,.12));color:var(--white);border:1px solid rgba(59,130,246,.2)}
.nav-icon{width:20px;text-align:center;font-size:15px;flex-shrink:0}
.nav-lbl{flex:1}
.sidebar-footer{padding:10px 8px;border-top:1px solid var(--border);flex-shrink:0}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:var(--card);border-bottom:1px solid var(--border);height:var(--topbar);padding:0 14px;display:flex;align-items:center;gap:8px;flex-shrink:0}
.topbar-title{font-size:15px;font-weight:800;color:var(--white);white-space:nowrap}
.cp-wrap{flex:1;max-width:480px;display:flex;gap:6px}
.cp-input{flex:1;background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:7px 12px;color:var(--text);font-size:12px;font-family:'Cairo',sans-serif;outline:none;direction:rtl;min-width:0}
.cp-input:focus{border-color:var(--accent)}
.cp-input::placeholder{color:var(--muted)}
.ws-pill{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);padding:4px 9px;border-radius:20px;background:var(--card2);border:1px solid var(--border);white-space:nowrap}
.ws-dot{width:7px;height:7px;border-radius:50%;background:#374151}
.ws-dot.on{background:var(--accent2);box-shadow:0 0 6px var(--accent2)}
.notif-wrap{position:relative}
.notif-badge{position:absolute;top:-5px;right:-5px;width:16px;height:16px;background:var(--danger);border-radius:50%;font-size:9px;display:none;align-items:center;justify-content:center;color:#fff;font-weight:700}
#content{flex:1;overflow-y:auto;padding:18px 20px;background:var(--bg)}
.btn{padding:7px 14px;border-radius:7px;border:none;cursor:pointer;font-family:'Cairo',sans-serif;font-size:12px;font-weight:700;transition:all .15s;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn-primary{background:linear-gradient(135deg,#1d4ed8,#2563eb);color:#fff}
.btn-primary:hover:not(:disabled){opacity:.88}
.btn-success{background:linear-gradient(135deg,#15803d,#16a34a);color:#fff}
.btn-success:hover:not(:disabled){opacity:.88}
.btn-danger{background:linear-gradient(135deg,#b91c1c,#dc2626);color:#fff}
.btn-danger:hover:not(:disabled){opacity:.88}
.btn-warn{background:linear-gradient(135deg,#b45309,#d97706);color:#fff}
.btn-ghost{background:var(--card2);color:var(--text);border:1px solid var(--border)}
.btn-ghost:hover:not(:disabled){border-color:var(--accent);color:var(--accent)}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:6px}
.btn-xs{padding:4px 8px;font-size:11px;border-radius:5px}
.btn-icon{padding:6px;border-radius:6px;background:var(--card2);border:1px solid var(--border);cursor:pointer;color:var(--muted);font-size:13px;display:inline-flex;align-items:center;justify-content:center;transition:all .15s;line-height:1}
.btn-icon:hover{border-color:var(--accent);color:var(--accent)}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:14px}
.card-sm{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 14px}
.page-hdr{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.page-title{font-size:20px;font-weight:900;color:var(--white)}
.page-sub{font-size:12px;color:var(--muted);margin-top:3px}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:14px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;position:relative;overflow:hidden;transition:border-color .2s,transform .15s}
.kpi:hover{border-color:var(--border2);transform:translateY(-1px)}
.kpi-glow{position:absolute;top:-20px;right:-20px;width:80px;height:80px;border-radius:50%;opacity:.07;filter:blur(18px)}
.kpi-icon{font-size:20px;margin-bottom:8px}
.kpi-val{font-size:26px;font-weight:900;color:var(--white);line-height:1}
.kpi-lbl{font-size:11px;color:var(--muted);margin-top:4px}
.kpi-chg{font-size:11px;margin-top:3px}
.kpi-chg.up{color:var(--accent2)}.kpi-chg.down{color:var(--danger)}.kpi-chg.warn{color:var(--warn)}.kpi-chg.info{color:var(--accent)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.grid4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px}
@media(max-width:900px){.grid3{grid-template-columns:1fr 1fr}.grid4{grid-template-columns:1fr 1fr}}
@media(max-width:700px){.grid2,.grid3,.grid4{grid-template-columns:1fr}}
.tbl-wrap{overflow-x:auto;border-radius:10px;border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{background:var(--card2);padding:9px 12px;text-align:right;color:var(--muted);font-weight:700;border-bottom:1px solid var(--border);white-space:nowrap;font-size:11px}
tbody tr{border-bottom:1px solid var(--border);transition:background .15s}
tbody tr:hover{background:rgba(59,130,246,.04)}
tbody tr:last-child{border-bottom:none}
td{padding:9px 12px;vertical-align:middle}
.td-name{font-weight:700;color:var(--white)}
.td-sub{font-size:11px;color:var(--muted);margin-top:1px}
.badge{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:5px;font-size:11px;font-weight:700;white-space:nowrap}
.badge-green{background:rgba(34,197,94,.12);color:#4ade80;border:1px solid rgba(34,197,94,.2)}
.badge-red{background:rgba(239,68,68,.12);color:#f87171;border:1px solid rgba(239,68,68,.2)}
.badge-yellow{background:rgba(245,158,11,.12);color:#fbbf24;border:1px solid rgba(245,158,11,.2)}
.badge-blue{background:rgba(59,130,246,.12);color:#60a5fa;border:1px solid rgba(59,130,246,.2)}
.badge-purple{background:rgba(139,92,246,.12);color:#a78bfa;border:1px solid rgba(139,92,246,.2)}
.badge-gray{background:rgba(107,114,128,.12);color:#9ca3af;border:1px solid rgba(107,114,128,.2)}
.badge-teal{background:rgba(20,184,166,.12);color:#2dd4bf;border:1px solid rgba(20,184,166,.2)}
.fg{margin-bottom:12px}
.flbl{display:block;font-size:11px;color:var(--muted);margin-bottom:5px;font-weight:700}
.finput{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:7px;padding:8px 11px;color:var(--text);font-size:13px;font-family:'Cairo',sans-serif;outline:none;transition:border-color .2s}
.finput:focus{border-color:var(--accent)}
.finput::placeholder{color:var(--muted)}
select.finput option{background:var(--card2)}
textarea.finput{min-height:80px;resize:vertical}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:8000;padding:16px;backdrop-filter:blur(4px)}
.modal{background:var(--card);border:1px solid var(--border2);border-radius:14px;padding:22px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 80px rgba(0,0,0,.8)}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.modal-title{font-size:16px;font-weight:800;color:var(--white)}
.modal-x{background:var(--card2);border:1px solid var(--border);width:28px;height:28px;border-radius:6px;cursor:pointer;color:var(--muted);font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.modal-x:hover{border-color:var(--danger);color:var(--danger)}
.modal-foot{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;padding-top:14px;border-top:1px solid var(--border)}
.toast-wrap{position:fixed;bottom:20px;left:20px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:11px 15px;min-width:220px;max-width:320px;display:flex;align-items:center;gap:8px;font-size:13px;box-shadow:0 8px 32px rgba(0,0,0,.7);animation:tin .25s ease;pointer-events:auto}
.toast.ok{border-color:var(--accent2)}.toast.err{border-color:var(--danger)}.toast.warn{border-color:var(--warn)}
@keyframes tin{from{transform:translateX(-20px);opacity:0}to{transform:none;opacity:1}}
.bar-wrap{display:flex;align-items:flex-end;gap:3px;height:100px;padding:4px 0}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;min-width:0}
.bar-fill{width:100%;border-radius:3px 3px 0 0;min-height:2px}
.bar-lbl{font-size:9px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;width:100%;text-align:center}
.prog{height:6px;background:var(--card2);border-radius:4px;overflow:hidden;min-width:40px}
.prog-fill{height:100%;border-radius:4px;transition:width .4s}
.tabs{display:flex;gap:4px;margin-bottom:16px;background:var(--card2);padding:4px;border-radius:9px;border:1px solid var(--border);flex-wrap:wrap}
.tab{padding:7px 14px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:700;color:var(--muted);transition:all .15s;border:none;background:none;font-family:'Cairo',sans-serif;white-space:nowrap}
.tab:hover{color:var(--text)}
.tab.active{background:var(--card);color:var(--white);box-shadow:0 2px 8px rgba(0,0,0,.3)}
.filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;align-items:center}
.f-inp{background:var(--card);border:1px solid var(--border);border-radius:7px;padding:6px 10px;color:var(--text);font-size:12px;font-family:'Cairo',sans-serif;outline:none;transition:border-color .2s}
.f-inp:focus{border-color:var(--accent)}
select.f-inp option{background:var(--card2)}
.sec-title{font-size:13px;font-weight:800;color:var(--white);margin-bottom:10px}
.empty{text-align:center;padding:36px;color:var(--muted)}
.empty-ico{font-size:36px;margin-bottom:10px}
.spin{display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle}
.spin-lg{width:28px;height:28px;border-width:3px}
@keyframes sp{to{transform:rotate(360deg)}}
.health-bar{display:flex;align-items:center;gap:8px}
.notif-panel{position:fixed;top:56px;left:0;width:340px;max-height:480px;background:var(--card);border:1px solid var(--border2);border-radius:12px;z-index:7000;box-shadow:0 16px 48px rgba(0,0,0,.8);overflow:hidden;display:none;flex-direction:column}
.notif-panel.open{display:flex}
.notif-hdr{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.notif-body{overflow-y:auto;padding:8px;flex:1}
.alert-item{display:flex;align-items:flex-start;gap:10px;padding:9px;border-radius:7px;background:var(--card2);border:1px solid var(--border);margin-bottom:6px}
.alert-icon{font-size:15px;flex-shrink:0;margin-top:1px}
.alert-txt{flex:1;min-width:0}
.alert-title{font-size:12px;font-weight:700;color:var(--white)}
.alert-time{font-size:10px;color:var(--muted);margin-top:2px}
</style>
</head>
<body>
<div id="app">
  <div class="sidebar" id="sidebar">
    <div class="logo">
      <div class="logo-icon">🤖</div>
      <div><div class="logo-text">TG AI System</div><div class="logo-sub">نظام إدارة ذكي</div></div>
    </div>
    <nav id="nav"></nav>
    <div class="sidebar-footer">
      <div class="ws-pill" style="width:100%;justify-content:center">
        <div class="ws-dot off" id="ws-dot"></div>
        <span id="ws-lbl" class="sf-lbl">غير متصل</span>
      </div>
    </div>
  </div>
  <div class="main">
    <div class="topbar">
      <button class="btn-icon" id="sidebar-toggle">☰</button>
      <span class="topbar-title" id="topbar-title">لوحة التحكم</span>
      <div class="cp-wrap">
        <input class="cp-input" id="cp-input" placeholder="🤖 مثال: انشر الإعلان في المجموعات التعليمية..."/>
        <button class="btn btn-primary btn-sm" id="cp-btn">⚡ تنفيذ</button>
      </div>
      <div class="notif-wrap">
        <button class="btn-icon" id="notif-btn">🔔</button>
        <div class="notif-badge" id="notif-badge">0</div>
      </div>
      <button class="btn-icon" onclick="navigate(currentPage)" title="تحديث">🔄</button>
    </div>
    <div id="content"><div class="empty"><div class="spin spin-lg"></div></div></div>
  </div>
</div>
<div class="notif-panel" id="notif-panel">
  <div class="notif-hdr">
    <span style="font-weight:800;color:var(--white)">🔔 الإشعارات</span>
    <button class="btn btn-xs btn-ghost" id="clear-notifs">مسح الكل</button>
  </div>
  <div class="notif-body" id="notif-body"><div class="empty" style="padding:20px;font-size:12px">لا توجد إشعارات</div></div>
</div>
<div class="toast-wrap" id="toasts"></div>
<script>
'use strict';
function toast(msg,type){type=type||'ok';var w=document.getElementById('toasts');var el=document.createElement('div');el.className='toast '+type;el.innerHTML='<span>'+(type==='ok'?'✅':type==='err'?'❌':'⚠️')+'</span><span style="flex:1">'+msg+'</span>';w.appendChild(el);setTimeout(function(){el.remove();},3800);}
async function api(path,opts){opts=opts||{};var r=await fetch(path,Object.assign({headers:{'Content-Type':'application/json'}},opts));if(!r.ok){var t=await r.text().catch(function(){return '';});throw new Error(r.status+': '+t.slice(0,150));}return r.json();}
function badge(txt,clr){clr=clr||'gray';return '<span class="badge badge-'+clr+'">'+txt+'</span>';}
function fmt(n){return(n||0).toLocaleString('ar');}
function pct(a,b){return b?Math.round(a/b*100):0;}
function hc(v){return v>=80?'var(--accent2)':v>=50?'var(--warn)':'var(--danger)';}
function ago(iso){if(!iso)return'—';var s=Math.floor((Date.now()-new Date(iso))/1000);if(s<60)return'منذ '+s+' ث';if(s<3600)return'منذ '+Math.floor(s/60)+' د';if(s<86400)return'منذ '+Math.floor(s/3600)+' س';return new Date(iso).toLocaleDateString('ar-SA');}
function barChart(data,xK,yK,color){color=color||'#3b82f6';if(!data||!data.length)return'<div class="empty" style="padding:16px;font-size:12px">لا توجد بيانات</div>';var max=Math.max.apply(null,data.map(function(d){return d[yK]||0;}))||1;return'<div class="bar-wrap">'+data.map(function(d){var h=Math.max(4,Math.round((d[yK]||0)/max*90));return'<div class="bar-col" title="'+d[xK]+': '+d[yK]+'"><div class="bar-fill" style="height:'+h+'px;background:'+color+';opacity:.85"></div><div class="bar-lbl">'+String(d[xK]||'').slice(-5)+'</div></div>';}).join('')+'</div>';}
function donutSvg(segs,size){size=size||100;var total=segs.reduce(function(s,x){return s+x.v;},0)||1;var offset=0;var r=35;var circ=2*Math.PI*r;var paths=segs.map(function(s){var dash=s.v/total*circ;var p='<circle cx="50" cy="50" r="35" fill="none" stroke="'+s.c+'" stroke-width="12" stroke-dasharray="'+dash+' '+(circ-dash)+'" stroke-dashoffset="'+-offset+'" transform="rotate(-90 50 50)" opacity=".9"/>';offset+=dash;return p;}).join('');return'<svg width="'+size+'" height="'+size+'" viewBox="0 0 100 100">'+paths+'<circle cx="50" cy="50" r="29" fill="var(--card)"/></svg>';}
function prog(val,max,color){color=color||'var(--accent)';var p=max?Math.min(100,Math.round(val/max*100)):0;return'<div class="prog"><div class="prog-fill" style="width:'+p+'%;background:'+color+'"></div></div>';}
function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function escJs(s){return String(s||'').replace(/\\/g,'\\\\').replace(/'/g,\"\'\").replace(/\n/g,'\\n');}
function exportCsv(rows,name){var csv=rows.map(function(r){return r.map(function(v){return'"'+String(v).replace(/"/g,'""')+'"';}).join(',');}).join('\n');var a=document.createElement('a');a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);a.download=name;a.click();toast('✅ تم التصدير');}
function kpiCard(icon,lbl,val,chgClass,chgTxt,glowColor){return'<div class="kpi"><div class="kpi-glow" style="background:'+glowColor+'"></div><div class="kpi-icon">'+icon+'</div><div class="kpi-val">'+val+'</div><div class="kpi-lbl">'+lbl+'</div><div class="kpi-chg '+chgClass+'">'+chgTxt+'</div></div>';}
function openModal(title,html,onSave){var ov=document.createElement('div');ov.className='modal-overlay';ov.innerHTML='<div class="modal"><div class="modal-hdr"><span class="modal-title">'+title+'</span><button class="modal-x">×</button></div><div class="modal-body">'+html+'</div><div class="modal-foot"><button class="btn btn-ghost close-btn">إلغاء</button>'+(onSave?'<button class="btn btn-primary save-btn">حفظ</button>':'')+'</div></div>';var close=function(){ov.remove();};ov.querySelector('.modal-x').addEventListener('click',close);ov.querySelector('.close-btn').addEventListener('click',close);if(onSave)ov.querySelector('.save-btn').addEventListener('click',function(){onSave(ov,close);});ov.addEventListener('click',function(e){if(e.target===ov)close();});document.body.appendChild(ov);return{ov:ov,close:close};}
function confirm2(msg,onOk){var r=openModal('تأكيد','<div style="padding:8px 0;font-size:14px;color:var(--text)">'+msg+'</div>',null);var foot=r.ov.querySelector('.modal-foot');foot.innerHTML='<button class="btn btn-ghost">إلغاء</button><button class="btn btn-danger ok-b">تأكيد</button>';foot.querySelector('.btn-ghost').addEventListener('click',r.close);foot.querySelector('.ok-b').addEventListener('click',function(){r.close();onOk();});}
var notifs=[];
function addNotif(type,title,detail){detail=detail||'';notifs.unshift({type:type,title:title,detail:detail,time:new Date()});if(notifs.length>30)notifs.pop();renderNotifs();}
function renderNotifs(){var bd=document.getElementById('notif-body');var nb=document.getElementById('notif-badge');if(!bd||!nb)return;nb.style.display=notifs.length?'flex':'none';nb.textContent=notifs.length;if(!notifs.length){bd.innerHTML='<div class="empty" style="padding:20px;font-size:12px">لا توجد إشعارات</div>';return;}var icons={ban:'🚫',warn:'⚠️',success:'✅',error:'❌',info:'ℹ️',bot:'🛡'};bd.innerHTML=notifs.map(function(n){return'<div class="alert-item"><div class="alert-icon">'+(icons[n.type]||'📌')+'</div><div class="alert-txt"><div class="alert-title">'+n.title+'</div>'+(n.detail?'<div class="alert-time">'+n.detail+'</div>':'')+'<div class="alert-time">'+ago(n.time)+'</div></div></div>';}).join('');}
document.getElementById('notif-btn').addEventListener('click',function(e){e.stopPropagation();document.getElementById('notif-panel').classList.toggle('open');});
document.getElementById('clear-notifs').addEventListener('click',function(){notifs=[];renderNotifs();});
document.addEventListener('click',function(e){if(!e.target.closest('#notif-panel')&&!e.target.closest('#notif-btn'))document.getElementById('notif-panel').classList.remove('open');});

/* ═══ PAGE: GROUPS ═══ */
async function pageGroups(){
  var el=document.getElementById('content');
  el.innerHTML=
    '<div class="page-hdr"><div><div class="page-title">👥 المجموعات الموحدة</div><div class="page-sub" id="grp-sub">جارٍ التحميل...</div></div>'+
    '<div style="display:flex;gap:8px;flex-wrap:wrap"><button class="btn btn-ghost btn-sm" id="grp-sync">🔄 مزامنة</button><button class="btn btn-ghost btn-sm" id="grp-export">⬇️ تصدير CSV</button><button class="btn btn-primary btn-sm" id="grp-add">+ إضافة</button></div></div>'+
    '<div class="filter-row"><input class="f-inp" id="gs" placeholder="🔍 بحث..." style="flex:1;min-width:140px">'+
    '<select class="f-inp" id="gc"><option value="">كل الفئات</option>'+['تعليمي','تجاري','رياضي','ترفيهي','ديني','تقني','طبي','أخرى'].map(function(c){return '<option>'+c+'</option>';}).join('')+'</select>'+
    '<select class="f-inp" id="gj"><option value="">كل الحالات</option><option value="true">منضم</option><option value="false">غير منضم</option></select>'+
    '<select class="f-inp" id="gp"><option value="">كل الحماية</option><option value="none">بدون</option><option value="جبل">جبل</option><option value="الماسة">الماسة</option></select>'+
    '<button class="btn btn-ghost btn-sm" id="grp-go">تطبيق</button><button class="btn btn-ghost btn-sm" id="grp-clear">مسح</button></div>'+
    '<div id="grp-stats" style="margin-bottom:10px"></div><div id="grp-table"></div>';
  var allData=[];
  async function load(){
    var tbl=document.getElementById('grp-table');tbl.innerHTML='<div class="empty"><div class="spin"></div></div>';
    var s=document.getElementById('gs').value||'',c=document.getElementById('gc').value||'',j=document.getElementById('gj').value||'';
    var p=new URLSearchParams();if(s)p.set('search',s);if(c)p.set('category',c);if(j!=='')p.set('is_joined',j);
    try{
      allData=await api('/api/groups?'+p);
      var pf=document.getElementById('gp').value||'',d=allData.slice();
      if(pf==='none')d=d.filter(function(g){return !g.protection_bot;});else if(pf)d=d.filter(function(g){return g.protection_bot===pf;});
      document.getElementById('grp-sub').textContent=d.length+' مجموعة';
      var tot=d.length,joined=d.filter(function(g){return g.is_joined;}).length,banned=d.filter(function(g){return g.is_banned;}).length;
      document.getElementById('grp-stats').innerHTML='<div style="display:flex;gap:8px;flex-wrap:wrap">'+
        [['إجمالي',tot,'blue'],['منضم',joined,'green'],['محظور',banned,'red'],['مغادر',tot-joined,'gray'],['مع حماية',d.filter(function(g){return g.protection_bot;}).length,'yellow']].map(function(x){
          return '<div class="card-sm" style="display:inline-flex;align-items:center;gap:8px">'+badge(x[0],x[2])+'<strong style="color:var(--white)">'+fmt(x[1])+'</strong></div>';}).join('')+'</div>';
      if(!d.length){tbl.innerHTML='<div class="empty"><div class="empty-ico">👥</div>لا توجد مجموعات تطابق الفلاتر</div>';return;}
      var aB={high:'green',medium:'yellow',low:'red',unknown:'gray'},aL={high:'عالي',medium:'متوسط',low:'منخفض',unknown:'غير معروف'};
      tbl.innerHTML='<div class="tbl-wrap"><table><thead><tr><th>المجموعة</th><th>الأعضاء</th><th>الفئة</th><th>الحالة</th><th>الحماية</th><th>النشاط</th><th>الطلاب</th><th>إجراءات</th></tr></thead><tbody>'+
        d.map(function(g){var sr=Math.round((g.student_ratio||0)*100);return '<tr>'+
          '<td><div class="td-name">'+escHtml(g.title||'—')+'</div>'+(g.username?'<div class="td-sub">@'+escHtml(g.username)+'</div>':'')+'</td>'+
          '<td style="font-weight:700;color:var(--white)">'+fmt(g.member_count)+'</td>'+
          '<td>'+(g.category?badge(g.category,'purple'):'<span style="color:var(--muted)">—</span>')+'</td>'+
          '<td>'+badge(g.is_joined?'منضم':'غير منضم',g.is_joined?'green':'gray')+'</td>'+
          '<td>'+(g.protection_bot?badge(g.protection_bot,'red'):'<span style="color:var(--muted)">لا يوجد</span>')+'</td>'+
          '<td>'+badge(aL[g.activity_level]||'غير معروف',aB[g.activity_level]||'gray')+'</td>'+
          '<td><div style="font-size:12px;font-weight:700;color:var(--white)">'+sr+'%</div>'+prog(sr,100,'var(--accent)')+'</td>'+
          '<td><div style="display:flex;gap:3px">'+
          '<button class="btn-icon" onclick="quickSend('+g.id+',\''+escJs(g.title||'')+'\')">📨</button>'+
          '<button class="btn-icon" onclick="editGroup('+g.id+',\''+escJs(g.category||'')+'\',\''+escJs(g.sub_category||'')+'\',\''+escJs(g.notes||'')+'\',load)">✏️</button>'+
          '<button class="btn-icon" onclick="copyLink(\''+escJs(g.username||'')+'\',\''+escJs(g.telegram_id||'')+'\')">🔗</button>'+
          '<button class="btn-icon" style="color:var(--warn)" onclick="blacklistGroup('+g.id+',\''+escJs(g.title||'')+'\',load)">🚫</button>'+
          '</div></td></tr>';}).join('')+'</tbody></table></div>';
    }catch(e){tbl.innerHTML='<div class="card" style="color:var(--danger)">❌ '+e.message+'</div>';}
  }
  document.getElementById('grp-go').addEventListener('click',load);
  document.getElementById('grp-clear').addEventListener('click',function(){['gs','gc','gj','gp'].forEach(function(id){var e=document.getElementById(id);if(e)e.value='';});load();});
  document.getElementById('gs').addEventListener('input',function(){setTimeout(load,450);});
  ['gc','gj','gp'].forEach(function(id){document.getElementById(id).addEventListener('change',load);});
  document.getElementById('grp-sync').addEventListener('click',function(){
    openModal('مزامنة المجموعات','<div class="fg"><label class="flbl">معرّف الحساب</label><input class="finput" id="m-aid" type="number" placeholder="1" dir="ltr"></div>',
      async function(ov,close){var id=parseInt(ov.querySelector('#m-aid').value);if(!id)return toast('أدخل معرّف الحساب','err');
        var btn=ov.querySelector('.save-btn');btn.disabled=true;btn.textContent='جارٍ...';
        try{var r=await api('/api/groups/action',{method:'POST',body:JSON.stringify({action:'sync_dialogs',account_id:id})});toast('✅ تمت المزامنة – '+(r.added||0)+' مجموعة جديدة');close();load();}
        catch(e){toast(e.message,'err');}finally{btn.disabled=false;btn.textContent='حفظ';}});
  });
  document.getElementById('grp-export').addEventListener('click',function(){
    if(!allData.length)return toast('لا توجد بيانات','warn');
    exportCsv([['ID','العنوان','Username','الأعضاء','الحالة','الفئة','الحماية','الطلاب%']].concat(allData.map(function(g){return [g.id,g.title,g.username||'',g.member_count,g.is_joined?'منضم':'غير منضم',g.category||'',g.protection_bot||'',Math.round((g.student_ratio||0)*100)+'%'];})),'groups.csv');
  });
  document.getElementById('grp-add').addEventListener('click',function(){editGroup(null,'','','',load);});
  load();
}

function editGroup(id,cat,sub,notes,onDone){
  openModal(id?'تعديل مجموعة':'إضافة مجموعة',
    '<div class="fg"><label class="flbl">الفئة</label><select class="finput" id="m-cat">'+['تعليمي','تجاري','رياضي','ترفيهي','ديني','تقني','طبي','أخرى'].map(function(c){return '<option'+(c===cat?' selected':'')+'>'+c+'</option>';}).join('')+'</select></div>'+
    '<div class="fg"><label class="flbl">الفئة الفرعية</label><input class="finput" id="m-sub" value="'+escHtml(sub||'')+'"></div>'+
    '<div class="fg"><label class="flbl">بوت الحماية</label><select class="finput" id="m-bot"><option value="">غير محدد</option>'+['جبل','الماسة','شيلد'].map(function(b){return '<option>'+b+'</option>';}).join('')+'</select></div>'+
    '<div class="fg"><label class="flbl">مستوى النشاط</label><select class="finput" id="m-act"><option value="">غير محدد</option><option value="high">عالي</option><option value="medium">متوسط</option><option value="low">منخفض</option></select></div>'+
    '<div class="fg"><label class="flbl">نسبة الطلاب (0-100)</label><input class="finput" id="m-sr" type="number" min="0" max="100" value="0" dir="ltr"></div>'+
    '<div class="fg"><label class="flbl">ملاحظات</label><textarea class="finput" id="m-notes">'+escHtml(notes||'')+'</textarea></div>',
    async function(ov,close){
      var data={category:ov.querySelector('#m-cat').value,sub_category:ov.querySelector('#m-sub').value,protection_bot:ov.querySelector('#m-bot').value||null,activity_level:ov.querySelector('#m-act').value||null,student_ratio:(parseInt(ov.querySelector('#m-sr').value)||0)/100,notes:ov.querySelector('#m-notes').value};
      try{await api('/api/groups/action',{method:'POST',body:JSON.stringify({action:'update',group_id:id,data:data})});toast('✅ تم الحفظ');close();if(onDone)onDone();}
      catch(e){toast(e.message,'err');}});
}
function quickSend(gid,gtitle){
  openModal('📨 إرسال إعلان – '+gtitle,'<div class="fg"><label class="flbl">معرّف الحساب</label><input class="finput" id="qs-acc" type="number" placeholder="1" dir="ltr"></div><div class="fg"><label class="flbl">نص الإعلان</label><textarea class="finput" id="qs-txt" style="min-height:100px"></textarea></div>',
    async function(ov,close){var acc=parseInt(ov.querySelector('#qs-acc').value),txt=ov.querySelector('#qs-txt').value.trim();if(!acc||!txt)return toast('أدخل الحساب والنص','err');
      try{await api('/api/messages/send',{method:'POST',body:JSON.stringify({account_id:acc,group_id:gid,content:txt})});toast('✅ تم الإرسال');close();}catch(e){toast(e.message,'err');}});
}
function copyLink(username,tgid){var link=username?'https://t.me/'+username:tgid||'';if(!link)return toast('لا يوجد رابط','warn');navigator.clipboard.writeText(link).then(function(){toast('✅ تم نسخ الرابط');}).catch(function(){toast('تعذر النسخ','err');});}
function blacklistGroup(id,title,onDone){confirm2('إضافة "'+title+'" للقائمة السوداء؟',async function(){try{await api('/api/groups/action',{method:'POST',body:JSON.stringify({action:'update',group_id:id,data:{notes:'قائمة سوداء'}})});toast('⛔ تمت الإضافة');if(onDone)onDone();}catch(e){toast(e.message,'err');}});}

/* ═══ PAGE: CAMPAIGNS ═══ */
async function pageCampaigns(){
  var el=document.getElementById('content');
  el.innerHTML='<div class="page-hdr"><div><div class="page-title">🚀 الحملات الإعلانية</div><div class="page-sub" id="camp-sub">جارٍ التحميل...</div></div><div style="display:flex;gap:8px"><button class="btn btn-ghost btn-sm" id="camp-exp">⬇️ تصدير</button><button class="btn btn-primary btn-sm" id="new-camp">+ حملة جديدة</button></div></div><div id="camp-list"><div class="empty"><div class="spin"></div></div></div>';

      var tM={};tmpls.forEach(function(t){tM[t.id]=t.name;});

        var lb=SC[c.status]||['غير معروف','gray'],st=c.stats||{},sent=st.sent||0,del=st.deleted||0,suc=sent-del,pc=sent?Math.round(suc/sent*100):0;

          '<div style="display:flex;gap:12px;flex-wrap:wrap;font-size:12px;margin-bottom:8px"><span>📨 <strong style="color:var(--white)">'+fmt(sent)+'</strong> مرسلة</span><span>✅ <strong style="color:var(--accent2)">'+fmt(suc)+'</strong> ناجحة</span><span>🗑 <strong style="color:var(--danger)">'+fmt(del)+'</strong> محذوفة</span><span>📊 <strong style="color:var(--warn)">'+pc+'%</strong> نجاح</span></div>'+
          (sent?'<div class="prog" style="margin-bottom:6px"><div class="prog-fill" style="width:'+pc+'%;background:'+(pc>70?'var(--accent2)':pc>40?'var(--warn)':'var(--danger)')+'"></div></div>':'')+
          (c.template_ids&&c.template_ids.length?'<div style="font-size:11px;color:var(--muted)">📝 '+c.template_ids.map(function(id){return tM[id]||'#'+id;}).join(' · ')+'</div>':'')+

          '<button class="btn btn-ghost btn-sm view-c" data-id="'+c.id+'">📈 تفاصيل</button>'+
          '<button class="btn btn-ghost btn-sm edit-c" data-id="'+c.id+'" data-n="'+escHtml(c.name)+'" data-cat="'+escHtml((c.target_criteria&&c.target_criteria.category)||'')+'">✏️ تعديل</button>'+

    var srch=document.getElementById('af-s').value.toLowerCase()||'';
    var d=allLogs.slice();
    if(agt)d=d.filter(function(l){return l.agent===agt;});
    if(srch)d=d.filter(function(l){return (l.action||'').toLowerCase().includes(srch)||JSON.stringify(l.details||{}).toLowerCase().includes(srch);});
    document.getElementById('aud-sub').textContent=d.length+' حدث';
    var today=new Date().toDateString();
    var todayL=allLogs.filter(function(l){return new Date(l.created_at).toDateString()===today;});
    var errs=todayL.filter(function(l){return (l.action||'').toLowerCase().includes('error')||(l.action||'').toLowerCase().includes('fail');});
    document.getElementById('aud-kpi').innerHTML=
      '<div style="display:flex;gap:8px;flex-wrap:wrap">'+
      [['اليوم',todayL.length,'blue'],['أخطاء',errs.length,'red'],['نجاح',todayL.length-errs.length,'green'],['الكل',allLogs.length,'gray']].map(function(x){
        return '<div class="card-sm" style="display:inline-flex;align-items:center;gap:8px">'+badge(x[0],x[2])+'<strong style="color:var(--white)">'+fmt(x[1])+'</strong></div>';
      }).join('')+'</div>';
    if(!d.length){tbl.innerHTML='<div class="empty"><div class="empty-ico">📋</div>لا توجد سجلات</div>';return;}
    var AC={Orchestrator:'purple',Planner:'blue',Executor:'green',Monitor:'yellow',Analyzer:'teal',System:'gray'};
    tbl.innerHTML='<div class="tbl-wrap"><table>'+
      '<thead><tr><th>الوكيل</th><th>الإجراء</th><th>التفاصيل</th><th>الوقت</th></tr></thead>'+
      '<tbody>'+d.map(function(l){
        return '<tr>'+
          '<td>'+badge(l.agent,AC[l.agent]||'gray')+'</td>'+
          '<td style="font-size:13px">'+escHtml(l.action||'—')+'</td>'+
          '<td style="font-size:11px;color:var(--muted);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+escHtml(JSON.stringify(l.details||{}))+'">'+escHtml(JSON.stringify(l.details||{}).slice(0,80))+'</td>'+
          '<td style="font-size:11px;color:var(--muted);white-space:nowrap">'+ago(l.created_at)+'</td></tr>';
      }).join('')+'</tbody></table></div>';
  }

  document.getElementById('aud-ref').addEventListener('click',load);
  document.getElementById('aud-go').addEventListener('click',render);
  document.getElementById('af-agt').addEventListener('change',render);
  document.getElementById('af-s').addEventListener('input',function(){setTimeout(render,400);});
  document.getElementById('aud-exp').addEventListener('click',function(){
    if(!allLogs.length)return toast('لا توجد سجلات','warn');
    exportCsv([['ID','الوكيل','الإجراء','التفاصيل','الوقت']].concat(
      allLogs.map(function(l){return [l.id,l.agent,l.action,JSON.stringify(l.details||{}),l.created_at];})),
    'audit_log.csv');
  });
  load();
}

/* ═══════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════ */
function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function escJs(s){return String(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,'\\n');}
function exportCsv(rows,name){
  var csv=rows.map(function(r){return r.map(function(v){return '"'+String(v).replace(/"/g,'""')+'"';}).join(',');}).join('\n');
  var a=document.createElement('a');a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);a.download=name;a.click();
  toast('✅ تم التصدير');
}

/* ═══════════════════════════════════════════
   COPILOT
═══════════════════════════════════════════ */
var cmdHist=[],cmdIdx=-1;

document.getElementById('cp-btn').addEventListener('click',runCopilot);
document.getElementById('cp-input').addEventListener('keydown',function(e){
  if(e.key==='Enter'){runCopilot();}
  else if(e.key==='ArrowUp'){if(cmdHist.length){cmdIdx=Math.min(cmdIdx+1,cmdHist.length-1);e.target.value=cmdHist[cmdIdx];}}
  else if(e.key==='ArrowDown'){if(cmdIdx>0){cmdIdx--;e.target.value=cmdHist[cmdIdx];}else{cmdIdx=-1;e.target.value='';}}
});

async function runCopilot(){
  var inp=document.getElementById('cp-input');var cmd=inp.value.trim();if(!cmd)return;
  cmdHist.unshift(cmd);if(cmdHist.length>20)cmdHist.pop();cmdIdx=-1;
  var btn=document.getElementById('cp-btn');btn.disabled=true;btn.innerHTML='<span class="spin"></span>';
  addNotif('info','⚡ تنفيذ: '+cmd.slice(0,40)+'...','المساعد يعالج طلبك');
  try{
    var r=await fetch('/api/copilot',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({command:cmd})});
    if(r.ok){toast('🤖 المساعد يعالج طلبك...');inp.value='';}
    else{var t=await r.text().catch(function(){return '';});toast('خطأ: '+t.slice(0,100),'err');}
  }catch(e){toast(e.message,'err');}
  finally{btn.disabled=false;btn.textContent='⚡ تنفيذ';}
}

/* ═══════════════════════════════════════════
   WEBSOCKET
═══════════════════════════════════════════ */
function connectWS(){
  var proto=location.protocol==='https:'?'wss':'ws';
  var ws=new WebSocket(proto+'://'+location.host+'/ws');
  var dot=document.getElementById('ws-dot'),lbl=document.getElementById('ws-lbl');
  ws.onopen=function(){dot.className='ws-dot on';lbl.textContent='متصل';};
  ws.onclose=function(){dot.className='ws-dot off';lbl.textContent='غير متصل';setTimeout(connectWS,5000);};
  ws.onmessage=function(e){
    try{
      var d=JSON.parse(e.data);if(d.type==='ping')return;
      var mp={copilot_result:'🤖 اكتمل المساعد',campaign_done:'🚀 اكتملت الحملة',account_added:'✅ تمت إضافة حساب',group_joined:'👥 تم الانضمام',message_sent:'📨 تم الإرسال',account_banned:'🚫 تم حظر حساب',bot_detected:'🛡 اكتُشف بوت حماية'};
      var ntp={copilot_result:'success',campaign_done:'success',account_added:'success',group_joined:'info',message_sent:'info',account_banned:'ban',bot_detected:'bot'};
      if(mp[d.type]){toast(mp[d.type]);addNotif(ntp[d.type]||'info',mp[d.type],'');}
    }catch(err){}
  };
}
connectWS();

});
