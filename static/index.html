<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TG AI System</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#07090f;--card:#0d1117;--card2:#131a26;--card3:#1a2333;
  --border:#1e2d42;--border2:#26384f;
  --accent:#3b82f6;--accent2:#22d3ee;--green:#10b981;--warn:#f59e0b;--danger:#f43f5e;--purple:#a78bfa;
  --text:#c4d4e8;--muted:#4e6a8a;--white:#eef4fc;
  --nav-h:60px;--topbar-h:54px;
  --radius:14px;--radius-sm:9px;
}
html,body{height:100%;font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);font-size:15px;overflow:hidden}

/* ═══ LAYOUT ═══ */
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* ═══ TOPBAR ═══ */
.topbar{
  height:var(--topbar-h);background:var(--card);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 12px;gap:8px;flex-shrink:0;
  position:sticky;top:0;z-index:100;
}
.topbar-logo{display:flex;align-items:center;gap:8px;flex-shrink:0}
.logo-icon{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,#1d4ed8,#7c3aed);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.topbar-title{font-size:15px;font-weight:800;color:var(--white);white-space:nowrap}
.topbar-title .sub{font-size:11px;color:var(--muted);font-weight:500;display:block}
.topbar-spacer{flex:1}
.ws-pill{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);padding:4px 9px;border-radius:20px;background:var(--card2);border:1px solid var(--border);white-space:nowrap;flex-shrink:0}
.ws-dot{width:7px;height:7px;border-radius:50%;background:#374151;flex-shrink:0}
.ws-dot.on{background:var(--green);box-shadow:0 0 6px var(--green)}
.tb-btn{padding:8px;border-radius:var(--radius-sm);background:none;border:1px solid transparent;cursor:pointer;color:var(--muted);font-size:16px;display:inline-flex;align-items:center;justify-content:center;line-height:1;position:relative;flex-shrink:0}
.tb-btn:active{background:var(--card2)}
.tb-badge{position:absolute;top:3px;left:3px;width:8px;height:8px;border-radius:50%;background:var(--danger);border:2px solid var(--card)}

/* ═══ CONTENT ═══ */
#content{flex:1;overflow-y:auto;overflow-x:hidden;padding:14px 12px 80px;background:var(--bg);-webkit-overflow-scrolling:touch}

/* ═══ BOTTOM NAV ═══ */
.bottom-nav{
  height:var(--nav-h);background:var(--card);border-top:1px solid var(--border);
  display:flex;align-items:stretch;flex-shrink:0;
  position:sticky;bottom:0;z-index:100;
}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;color:var(--muted);border:none;background:none;font-family:inherit;padding:6px 2px;transition:color .15s;min-width:0}
.nav-item .nav-icon{font-size:20px;line-height:1}
.nav-item .nav-lbl{font-size:10px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:52px;text-align:center}
.nav-item.active{color:var(--accent)}
.nav-item.active .nav-icon{filter:drop-shadow(0 0 5px rgba(59,130,246,.5))}
.nav-more-menu{position:fixed;bottom:calc(var(--nav-h) + 8px);left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--border2);border-radius:var(--radius);padding:8px;min-width:200px;z-index:200;display:none;box-shadow:0 -8px 32px rgba(0,0,0,.5)}
.nav-more-menu.open{display:block}
.nav-more-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius-sm);cursor:pointer;color:var(--text);font-size:13px;font-weight:700;width:100%;background:none;border:none;font-family:inherit;text-align:right}
.nav-more-item:active{background:var(--card2)}

/* ═══ SIDEBAR ═══ */
.sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:300;opacity:0;pointer-events:none;transition:opacity .25s;backdrop-filter:blur(2px)}
.sidebar-overlay.open{opacity:1;pointer-events:all}
.sidebar{position:fixed;top:0;right:-280px;width:280px;height:100%;background:var(--card);border-left:1px solid var(--border2);z-index:301;transition:right .28s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;overflow:hidden}
.sidebar.open{right:0}
.sidebar-header{padding:16px 14px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
.sidebar-logo{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#1d4ed8,#7c3aed);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.sidebar-name{font-size:15px;font-weight:800;color:var(--white)}
.sidebar-name span{font-size:11px;color:var(--muted);font-weight:500;display:block}
.sidebar-close{margin-right:auto;padding:6px;border-radius:8px;background:none;border:none;cursor:pointer;color:var(--muted);font-size:18px;line-height:1}
.sidebar-close:active{background:var(--card2)}
.sidebar-body{flex:1;overflow-y:auto;padding:10px 8px 20px}
.sidebar-section-lbl{font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;padding:10px 8px 4px}
.sidebar-item{display:flex;align-items:center;gap:12px;padding:11px 10px;border-radius:var(--radius-sm);cursor:pointer;color:var(--text);font-size:14px;font-weight:700;width:100%;background:none;border:none;font-family:inherit;text-align:right;transition:background .12s,color .12s;position:relative}
.sidebar-item:active{background:var(--card3)}
.sidebar-item.active{background:linear-gradient(135deg,rgba(59,130,246,.18),rgba(124,58,237,.12));color:var(--accent)}
.sidebar-item .s-icon{font-size:20px;width:28px;text-align:center;flex-shrink:0}
.sidebar-item .s-lbl{flex:1}
.sidebar-item .s-badge{background:var(--accent);color:#fff;font-size:10px;font-weight:800;padding:2px 7px;border-radius:20px;flex-shrink:0}
.sidebar-divider{height:1px;background:var(--border);margin:6px 8px}

/* ═══ CARDS ═══ */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:12px}
.card-sm{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px}

/* ═══ PAGE HEADER ═══ */
.page-hdr{margin-bottom:14px}
.page-hdr-top{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px}
.page-title{font-size:18px;font-weight:900;color:var(--white)}
.page-sub{font-size:12px;color:var(--muted);margin-top:2px}
.page-actions{display:flex;gap:6px;flex-wrap:nowrap;width:100%}.page-actions .btn{flex:1;min-width:0;font-size:11px;padding:7px 4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ═══ KPI GRID ═══ */
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.kpi-grid-4{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;position:relative;overflow:hidden;cursor:pointer;transition:border-color .2s,transform .15s}
.kpi:active{transform:scale(.97)}
.kpi-glow{position:absolute;top:-20px;right:-20px;width:70px;height:70px;border-radius:50%;opacity:.08;filter:blur(16px)}
.kpi-icon{font-size:18px;margin-bottom:6px}
.kpi-val{font-size:22px;font-weight:900;color:var(--white);line-height:1}
.kpi-lbl{font-size:11px;color:var(--muted);margin-top:3px}
.kpi-chg{font-size:11px;margin-top:2px}
.kpi-chg.up{color:var(--green)}.kpi-chg.down{color:var(--danger)}.kpi-chg.warn{color:var(--warn)}.kpi-chg.info{color:var(--accent2)}

/* ═══ BUTTONS ═══ */
.btn{padding:9px 16px;border-radius:var(--radius-sm);border:none;cursor:pointer;font-family:'Tajawal',sans-serif;font-size:13px;font-weight:700;transition:all .15s;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;-webkit-tap-highlight-color:transparent}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn:active:not(:disabled){transform:scale(.96)}
.btn-primary{background:linear-gradient(135deg,#1d4ed8,#2563eb);color:#fff}
.btn-success{background:linear-gradient(135deg,#065f46,#059669);color:#fff}
.btn-danger{background:linear-gradient(135deg,#9f1239,#e11d48);color:#fff}
.btn-warn{background:linear-gradient(135deg,#92400e,#d97706);color:#fff}
.btn-purple{background:linear-gradient(135deg,#5b21b6,#7c3aed);color:#fff}
.btn-teal{background:linear-gradient(135deg,#0f766e,#0891b2);color:#fff}
.btn-ghost{background:var(--card2);color:var(--text);border:1px solid var(--border)}
.btn-sm{padding:7px 13px;font-size:12px;border-radius:7px}
.btn-xs{padding:5px 10px;font-size:11px;border-radius:6px}
.btn-icon{padding:8px;border-radius:7px;background:var(--card2);border:1px solid var(--border);cursor:pointer;color:var(--muted);font-size:14px;display:inline-flex;align-items:center;justify-content:center;line-height:1;font-family:inherit}
.btn-icon:active{border-color:var(--accent);color:var(--accent)}
.btn-full{width:100%;justify-content:center;padding:12px}

/* ═══ BADGES ═══ */
.badge{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:5px;font-size:11px;font-weight:700;white-space:nowrap}
.badge-green{background:rgba(16,185,129,.12);color:#34d399;border:1px solid rgba(16,185,129,.2)}
.badge-red{background:rgba(244,63,94,.12);color:#fb7185;border:1px solid rgba(244,63,94,.2)}
.badge-yellow{background:rgba(245,158,11,.12);color:#fbbf24;border:1px solid rgba(245,158,11,.2)}
.badge-blue{background:rgba(59,130,246,.12);color:#60a5fa;border:1px solid rgba(59,130,246,.2)}
.badge-purple{background:rgba(167,139,250,.12);color:#c4b5fd;border:1px solid rgba(167,139,250,.2)}
.badge-gray{background:rgba(100,116,139,.12);color:#94a3b8;border:1px solid rgba(100,116,139,.2)}
.badge-teal{background:rgba(6,182,212,.12);color:#22d3ee;border:1px solid rgba(6,182,212,.2)}
.badge-orange{background:rgba(249,115,22,.12);color:#fb923c;border:1px solid rgba(249,115,22,.2)}

/* ═══ FORMS ═══ */
.fg{margin-bottom:12px}
.flbl{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;font-weight:700}
.finput{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;color:var(--text);font-size:14px;font-family:'Tajawal',sans-serif;outline:none;transition:border-color .2s;-webkit-appearance:none}
.finput:focus{border-color:var(--accent)}
.fselect{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;color:var(--text);font-size:14px;font-family:'Tajawal',sans-serif;outline:none;cursor:pointer;-webkit-appearance:none}
.ftextarea{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;color:var(--text);font-size:14px;font-family:'Tajawal',sans-serif;outline:none;resize:vertical;min-height:90px}
.finput:focus,.fselect:focus,.ftextarea:focus{border-color:var(--accent)}

/* ═══ MODAL ═══ */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:flex-end;justify-content:center;z-index:1000;backdrop-filter:blur(4px)}
.modal{background:var(--card);border:1px solid var(--border2);border-radius:var(--radius) var(--radius) 0 0;padding:20px;width:100%;max-height:90vh;overflow-y:auto;animation:slideUp .22s ease}
@keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.modal-title{font-size:16px;font-weight:800;color:var(--white)}
.modal-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:20px;line-height:1;padding:4px}
.modal-foot{display:flex;gap:8px;margin-top:16px;padding-top:12px;border-top:1px solid var(--border)}
.modal-foot .btn{flex:1;justify-content:center}

/* ═══ TABLES — card list on mobile ═══ */
.tbl-wrap{border-radius:var(--radius);border:1px solid var(--border);overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{background:var(--card2);padding:9px 10px;text-align:right;color:var(--muted);font-weight:700;border-bottom:1px solid var(--border);white-space:nowrap;font-size:11px}
tbody tr{border-bottom:1px solid var(--border);transition:background .15s}
tbody tr:last-child{border-bottom:none}
td{padding:9px 10px;vertical-align:middle}
.td-name{font-weight:700;color:var(--white);font-size:13px}
.td-sub{font-size:11px;color:var(--muted);margin-top:1px}

/* ═══ ROW CARDS (mobile friendly list) ═══ */
.row-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:12px;margin-bottom:8px;cursor:pointer;transition:border-color .15s}
.row-card:active{border-color:var(--border2);background:var(--card2)}
.row-card-hdr{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:6px}
.row-card-title{font-size:14px;font-weight:700;color:var(--white)}
.row-card-sub{font-size:11px;color:var(--muted);margin-top:2px}
.row-card-meta{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;align-items:center}
.row-card-actions{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}

/* ═══ CHART ═══ */
.chart-wrap{position:relative;height:180px}
.chart-wrap-lg{position:relative;height:220px}

/* ═══ ALERTS ═══ */
.alert{padding:10px 12px;border-radius:var(--radius-sm);font-size:13px;margin-bottom:10px;display:flex;gap:8px;align-items:flex-start}
.alert-info{background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.2);color:#93c5fd}
.alert-warn{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.2);color:#fcd34d}
.alert-danger{background:rgba(244,63,94,.1);border:1px solid rgba(244,63,94,.2);color:#fca5a5}
.alert-success{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.2);color:#6ee7b7}

/* ═══ PROGRESS ═══ */
.progress{background:var(--card2);border-radius:99px;height:5px;overflow:hidden;width:100%}
.progress-bar{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent),var(--purple));transition:width .3s}

/* ═══ TABS ═══ */
.tabs{display:flex;gap:0;margin-bottom:14px;border-bottom:1px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:9px 14px;border-radius:0;cursor:pointer;font-size:13px;font-weight:700;color:var(--muted);background:none;border:none;border-bottom:2px solid transparent;white-space:nowrap;font-family:inherit;margin-bottom:-1px;transition:all .15s}
.tab:active,.tab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* ═══ TOAST ═══ */
#toast-container{position:fixed;bottom:calc(var(--nav-h) + 10px);left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:6px;align-items:center;width:90%;pointer-events:none}
.toast{padding:10px 16px;border-radius:var(--radius-sm);font-size:13px;font-weight:700;color:#fff;animation:toastIn .2s ease;text-align:center;width:100%;pointer-events:all;box-shadow:0 4px 20px rgba(0,0,0,.4)}
.toast-success{background:rgba(5,150,105,.95)}
.toast-error{background:rgba(225,29,72,.95)}
.toast-info{background:rgba(29,78,216,.95)}
@keyframes toastIn{from{transform:translateY(10px);opacity:0}to{transform:translateY(0);opacity:1}}

/* ═══ SPINNER ═══ */
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;display:inline-block;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-center{display:flex;align-items:center;justify-content:center;gap:10px;color:var(--muted);padding:40px}

/* ═══ EMPTY STATE ═══ */
.empty-state{text-align:center;padding:40px 20px;color:var(--muted)}
.empty-state .es-icon{font-size:38px;margin-bottom:10px;opacity:.4}
.empty-state p{font-size:13px}

/* ═══ FILTER BAR ═══ */
.filter-bar{display:flex;gap:8px;margin-bottom:10px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px}
.filter-bar::-webkit-scrollbar{display:none}
.filter-bar .fselect,.filter-bar .finput{min-width:130px;width:auto;flex-shrink:0;font-size:13px;padding:8px 10px}

/* ═══ COPILOT DRAWER ═══ */
.cp-drawer{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;display:none;flex-direction:column;justify-content:flex-end;backdrop-filter:blur(3px)}
.cp-drawer.open{display:flex}
.cp-panel{background:var(--card);border-radius:var(--radius) var(--radius) 0 0;padding:16px;max-height:70vh;display:flex;flex-direction:column;animation:slideUp .22s ease}
.cp-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.cp-title{font-size:15px;font-weight:800;color:var(--white)}
.cp-history{flex:1;overflow-y:auto;margin-bottom:10px;display:flex;flex-direction:column;gap:6px;max-height:200px}
.cp-msg{padding:8px 12px;border-radius:8px;font-size:13px}
.cp-msg.user{background:rgba(59,130,246,.15);border:1px solid rgba(59,130,246,.25);color:#93c5fd;align-self:flex-end;max-width:85%}
.cp-msg.bot{background:var(--card2);border:1px solid var(--border);color:var(--text);max-width:92%}
.cp-bar{display:flex;gap:8px;align-items:center}
.cp-bar .finput{flex:1}

/* ═══ WIZARD ═══ */
.wizard-steps{display:flex;gap:4px;margin-bottom:16px}
.wizard-step{flex:1;text-align:center;padding:7px 4px;border-radius:7px;font-size:11px;font-weight:700;background:var(--card2);color:var(--muted);border:1px solid var(--border)}
.wizard-step.active{background:rgba(59,130,246,.15);color:var(--accent);border-color:rgba(59,130,246,.3)}
.wizard-step.done{background:rgba(16,185,129,.1);color:var(--green);border-color:rgba(16,185,129,.2)}

/* ═══ IMPORT CARD ═══ */
.import-card{background:var(--card2);border:1px solid var(--border);border-radius:var(--radius);padding:12px;display:flex;align-items:center;gap:12px;margin-bottom:8px}
.import-icon{width:40px;height:40px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.import-info{flex:1;min-width:0}
.import-title{font-size:13px;font-weight:700;color:var(--white);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.import-meta{font-size:11px;color:var(--muted);margin-top:2px}

/* ═══ AI MODEL CARD ═══ */
.ai-model-card{background:var(--card2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:8px}
.ai-model-card.active-model{border-color:rgba(16,185,129,.3)}
.model-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.model-avatar{width:40px;height:40px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.model-name{font-size:14px;font-weight:800;color:var(--white)}
.model-provider{font-size:11px;color:var(--muted);margin-top:1px}

/* ═══ SEARCH OVERLAY ═══ */
.search-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:900;display:none;flex-direction:column;padding:16px;backdrop-filter:blur(4px)}
.search-overlay.open{display:flex}
.search-box{background:var(--card);border:1px solid var(--border2);border-radius:var(--radius);overflow:hidden}
.search-input{width:100%;background:none;border:none;padding:14px 16px;color:var(--white);font-size:16px;font-family:'Tajawal',sans-serif;outline:none}
.search-results{border-top:1px solid var(--border);max-height:60vh;overflow-y:auto}
.search-result{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;border-bottom:1px solid var(--border)}
.search-result:last-child{border-bottom:none}
.search-result:active{background:var(--card2)}

/* ═══ SECTION TITLE ═══ */
.section-title{font-size:13px;font-weight:800;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:.04em}

/* ═══ NOTIFICATION SHEET ═══ */

<script>
// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
const state = {
  page: 'dashboard',
  ws: null,
  charts: {},
  analyticsTab: 'overview',
  notifications: 3,
  selectedGroups: new Set(),
  cpHistory: [],
};

// ═══════════════════════════════════════════════════════
// WEBSOCKET
// ═══════════════════════════════════════════════════════
function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  state.ws = new WebSocket(`${proto}://${location.host}/ws`);
  state.ws.onopen = () => {
    document.getElementById('ws-dot').classList.add('on');
    document.getElementById('ws-lbl').textContent = 'متصل';
  };
  state.ws.onclose = () => {
    document.getElementById('ws-dot').classList.remove('on');
    document.getElementById('ws-lbl').textContent = 'غير متصل';
    setTimeout(connectWS, 4000);
  };
  state.ws.onmessage = e => {
    const d = JSON.parse(e.data);
    if (d.type === 'ping') return;
    if (d.type === 'copilot_result') {
      addCpMsg(d.data?.result || 'تم التنفيذ', 'bot');
      toast(d.data?.result || 'تم التنفيذ', 'success');
    } else if (d.type === 'account_added') { toast(`✅ حساب ${d.phone} أُضيف`, 'success'); addNotif(`حساب ${d.phone} أُضيف`); }
    else if (d.type === 'group_joined') toast(`✅ انضممت لـ ${d.title}`, 'success');
    else if (d.type === 'groups_synced') toast(`🔄 مزامنة: ${d.added} مجموعة`, 'info');
    else if (d.type === 'message_sent') toast(`📨 رسالة لـ ${d.group}`, 'info');
    else if (d.type === 'campaign_done') { toast(`✅ الحملة ${d.id} اكتملت`, 'success'); addNotif(`الحملة ${d.id} اكتملت`); }
    if (['account_added','groups_synced','message_sent','campaign_done'].includes(d.type) && state.page === 'dashboard') renderDashboard();
  };
}

// ═══════════════════════════════════════════════════════
// API
// ═══════════════════════════════════════════════════════
async function api(path, method='GET', body=null) {
  const opts = { method, headers: {'Content-Type':'application/json'} };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(path, opts);
  if (!r.ok) {
    const err = await r.json().catch(()=>({detail: r.statusText}));
    throw new Error(err.detail || r.statusText);
  }
  return r.json();
}

// ═══════════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════════
function toast(msg, type='info') {
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 3200);
}

// ═══════════════════════════════════════════════════════
// NOTIFICATIONS
// ═══════════════════════════════════════════════════════
function addNotif(msg) {
  state.notifications++;
  document.getElementById('notif-badge').style.display='block';
  const list = document.getElementById('notif-list');
  const item = document.createElement('div');
  item.className = 'notif-item';
  item.innerHTML = `<div class="notif-title">🔔 ${msg}</div><div class="notif-sub">الآن</div>`;
  list.insertBefore(item, list.firstChild);
}
function clearNotifs() {
  state.notifications=0;
  document.getElementById('notif-badge').style.display='none';
  document.getElementById('notif-list').innerHTML='<div style="padding:20px;text-align:center;color:var(--muted);font-size:13px">لا توجد إشعارات</div>';
}
function openNotifSheet() { document.getElementById('notif-sheet').classList.add('open'); }
function closeNotifSheet() { document.getElementById('notif-sheet').classList.remove('open'); }
function closeNotifIfOutside(e) { if (e.target===document.getElementById('notif-sheet')) closeNotifSheet(); }

// ═══════════════════════════════════════════════════════
// MORE MENU
// ═══════════════════════════════════════════════════════
function toggleMoreMenu() { document.getElementById('nav-more-menu').classList.toggle('open'); }
function closeMoreMenu() { document.getElementById('nav-more-menu').classList.remove('open'); }
document.addEventListener('click', e => {
  if (!e.target.closest('#nav-more') && !e.target.closest('#nav-more-menu')) closeMoreMenu();
});

// ═══════════════════════════════════════════════════════
// SIDEBAR
// ═══════════════════════════════════════════════════════
function openSidebar() {
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('sidebar-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('open');
  document.body.style.overflow = '';
}
function sidebarNav(page) {
  closeSidebar();
  navigate(page);
  // Update active state
  document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
  const target = document.getElementById('sb-' + page);
  if (target) target.classList.add('active');
}

// ═══════════════════════════════════════════════════════
// SEARCH
// ═══════════════════════════════════════════════════════
function openSearch() {
  document.getElementById('search-overlay').classList.add('open');
  doSearch('');
  setTimeout(()=>document.getElementById('search-input').focus(),100);
}
function closeSearch() {
  document.getElementById('search-overlay').classList.remove('open');
  document.getElementById('search-input').value='';
}
function doSearch(q) {
  const pages=[
    {icon:'🏠',title:'لوحة التحكم',sub:'ملخص النظام',page:'dashboard'},
    {icon:'👥',title:'المجموعات',sub:'إدارة المجموعات',page:'groups'},
    {icon:'📢',title:'الحملات',sub:'الحملات الإعلانية',page:'campaigns'},
    {icon:'📝',title:'صيغ الإعلانات',sub:'مكتبة النصوص',page:'templates'},
    {icon:'📱',title:'الحسابات',sub:'حسابات تيليجرام',page:'accounts'},
    {icon:'🌐',title:'البروكسيات',sub:'إدارة IP',page:'proxies'},
    {icon:'📊',title:'التحليلات',sub:'الرسوم البيانية',page:'analytics'},
    {icon:'📂',title:'المجلدات',sub:'استيراد المجموعات',page:'folders'},
    {icon:'🧠',title:'مراقبة AI',sub:'إحصائيات نماذج الذكاء',page:'ai_monitor'},
    {icon:'🤖',title:'المهندس AI',sub:'إضافة ميزات جديدة',page:'engineer'},
    {icon:'📋',title:'سجل الأحداث',sub:'سجل كامل',page:'audit'},
    {icon:'⚙️',title:'الإعدادات',sub:'إعدادات النظام',page:'settings'},
  ];
  const filtered = q ? pages.filter(p=>p.title.includes(q)||p.sub.includes(q)) : pages;
  document.getElementById('search-results').innerHTML = filtered.map(p=>`
    <div class="search-result" onclick="navigate('${p.page}');closeSearch()">
      <span style="font-size:18px">${p.icon}</span>
      <div><div style="font-size:14px;font-weight:700;color:var(--white)">${p.title}</div><div style="font-size:11px;color:var(--muted)">${p.sub}</div></div>
    </div>`).join('');
}

// ═══════════════════════════════════════════════════════
// COPILOT
// ═══════════════════════════════════════════════════════
function openCopilot() { document.getElementById('cp-drawer').classList.add('open'); setTimeout(()=>document.getElementById('cp-input').focus(),100); }
function closeCopilot() { document.getElementById('cp-drawer').classList.remove('open'); }
function closeCpIfOutside(e) { if(e.target===document.getElementById('cp-drawer')) closeCopilot(); }
function addCpMsg(msg, role) {
  const h = document.getElementById('cp-history');
  const el = document.createElement('div');
  el.className=`cp-msg ${role}`;
  el.textContent=msg;
  h.appendChild(el);
  h.scrollTop=h.scrollHeight;
  if(role==='user') state.cpHistory.push(msg);
}
function fillCp(cmd) { document.getElementById('cp-input').value=cmd; document.getElementById('cp-input').focus(); }
async function sendCp() {
  const inp=document.getElementById('cp-input');
  const cmd=inp.value.trim();
  if(!cmd) return;
  inp.value='';
  addCpMsg(cmd,'user');
  addCpMsg('⏳ جاري التنفيذ...','bot');
  try { await api('/api/copilot','POST',{command:cmd}); }
  catch(e) { addCpMsg('❌ خطأ: '+e.message,'bot'); }
}

// ═══════════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════════
const pageTitles = {
  dashboard:'لوحة التحكم',groups:'المجموعات',campaigns:'الحملات',
  templates:'صيغ الإعلانات',accounts:'الحسابات',proxies:'البروكسيات',
  analytics:'التحليلات',audit:'سجل الأحداث',settings:'الإعدادات',
  folders:'المجلدات',engineer:'المهندس AI',ai_monitor:'مراقبة AI'
};
const mainNavPages=['dashboard','groups','accounts','campaigns'];
function navigate(page) {
  state.page=page;
  state.selectedGroups.clear();
  document.getElementById('topbar-title').textContent=pageTitles[page]||page;
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
  const navEl=document.getElementById('nav-'+page);
  if(navEl) navEl.classList.add('active');
  else document.getElementById('nav-more').classList.add('active');
  Object.values(state.charts).forEach(c=>{try{c.destroy();}catch{}});
  state.charts={};
  closeCopilot();
  document.getElementById('content').scrollTop=0;
  const fn={
    dashboard:renderDashboard,groups:renderGroups,campaigns:renderCampaigns,
    templates:renderTemplates,accounts:renderAccounts,proxies:renderProxies,
    analytics:renderAnalytics,audit:renderAudit,settings:renderSettings,
    folders:renderFolders,engineer:renderEngineer,ai_monitor:renderAiMonitor
  }[page];
  if(fn) fn();
}

// ═══════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════
const statusBadge=s=>{
  const m={active:'badge-green',pending:'badge-yellow',banned:'badge-red',flood:'badge-orange',draft:'badge-gray',running:'badge-blue',paused:'badge-yellow',done:'badge-green',failed:'badge-red'};
  const l={active:'نشط',pending:'بانتظار',banned:'محظور',flood:'محدود',draft:'مسودة',running:'يعمل',paused:'موقوف',done:'منتهية',failed:'فاشل'};
  return `<span class="badge ${m[s]||'badge-gray'}">${l[s]||s}</span>`;
};
const protBadge=p=>{
  if(!p) return '<span class="badge badge-green">لا يوجد</span>';
  const m={'جبل':'badge-red','الماسة':'badge-purple','سريع(<30ث)':'badge-red','بطيء':'badge-yellow'};
  return `<span class="badge ${m[p]||'badge-orange'}">⚡ ${p}</span>`;
};
const actBadge=a=>{
  const m={high:'badge-green',medium:'badge-yellow',low:'badge-orange',dead:'badge-red',unknown:'badge-gray'};
  const l={high:'عالي',medium:'متوسط',low:'منخفض',dead:'ميت',unknown:'؟'};
  return `<span class="badge ${m[a]||'badge-gray'}">${l[a]||a}</span>`;
};
const catBadge=c=>c?`<span class="badge badge-blue">${c}</span>`:'<span class="badge badge-gray">—</span>';
const fmt=n=>n==null?'—':Number(n).toLocaleString('ar');
const pct=(a,b)=>b?Math.round(a/b*100)+'%':'0%';
function mkChart(id,type,labels,datasets,opts={}) {
  const ctx=document.getElementById(id);
  if(!ctx) return null;
  if(state.charts[id]) state.charts[id].destroy();
  const dark={color:'#4e6a8a',grid:{color:'rgba(30,45,71,.5)'}};
  const cfg={type,data:{labels,datasets},options:{responsive:true,maintainAspectRatio:false,
    plugins:{legend:{labels:{color:'#4e6a8a',font:{family:'Tajawal',size:11}},...(opts.legend||{})}},
    scales:type!=='pie'&&type!=='doughnut'?{x:{ticks:dark,grid:dark},y:{ticks:dark,grid:dark}}:undefined,
    ...opts.extra}};
  state.charts[id]=new Chart(ctx,cfg);
  return state.charts[id];
}

// ═══════════════════════════════════════════════════════
// DASHBOARD
// ═══════════════════════════════════════════════════════
async function renderDashboard() {
  document.getElementById('content').innerHTML=`<div class="loading-center"><div class="spinner"></div> جاري التحميل...</div>`;
  const [ov,timeline,byCat,byProt]=await Promise.all([
    api('/api/stats/overview'),api('/api/stats/messages_timeline?days=7'),

let _allGroups=[];
function _groupCard(g){
  return `<div class="row-card" data-id="${g.id}" data-cat="${g.category||''}" data-joined="${g.is_joined}" data-prot="${g.protection_bot||''}" data-title="${(g.title||'').toLowerCase()}">

async function renderGroups() {

  </div>

    <select class="fselect" id="g-joined" onchange="applyGroupFilters()">
      <option value="">الكل</option>
      <option value="true">منضم</option>
      <option value="false">مغادر</option>
    </select>
    <select class="fselect" id="g-cat" onchange="applyGroupFilters()">
      <option value="">كل التصنيفات</option>
      ${['تعليمي','تقني','تجاري','ترفيهي','إخباري','عام'].map(c=>`<option value="${c}">${c}</option>`).join('')}
    </select>
    <select class="fselect" id="g-prot" onchange="applyGroupFilters()">
      <option value="">كل الحماية</option>
      <option value="none">بدون</option>
      <option value="جبل">جبل</option>
      <option value="الماسة">الماسة</option>
    </select>
  </div>

  <div id="groups-list">
  ${_allGroups.length===0?`<div class="empty-state"><div class="es-icon">👥</div><p>لا توجد مجموعات</p></div>`:_allGroups.map(_groupCard).join('')}
  </div>`;
}

let _gDebTimer;
function debounceGroups(){clearTimeout(_gDebTimer);_gDebTimer=setTimeout(applyGroupFilters,400);}
function applyGroupFilters(){
  const search=(document.getElementById('g-search')?.value||'').toLowerCase();
  const cat=document.getElementById('g-cat')?.value||'';
  const joined=document.getElementById('g-joined')?.value||'';
  const prot=document.getElementById('g-prot')?.value||'';
  const filtered=_allGroups.filter(g=>{
    if(search && !(g.title||'').toLowerCase().includes(search)) return false;
    if(cat && g.category!==cat) return false;
    if(joined==='true' && !g.is_joined) return false;
    if(joined==='false' && g.is_joined) return false;
    if(prot==='none' && g.protection_bot) return false;
    if(prot && prot!=='none' && g.protection_bot!==prot) return false;
    return true;
  });
  const list=document.getElementById('groups-list');
  const cnt=document.getElementById('g-count');
  if(list) list.innerHTML=filtered.length===0?`<div class="empty-state"><div class="es-icon">👥</div><p>لا توجد نتائج</p></div>`:filtered.map(_groupCard).join('');
  if(cnt) cnt.textContent=fmt(filtered.length)+' مجموعة';
}
async function _refreshGroups(){_allGroups=await api('/api/groups');applyGroupFilters();}
async function toggleFav(id){await api('/api/groups/action','POST',{action:'favorite',group_id:id});_refreshGroups();}
async function toggleBlacklist(id,current){
  await api('/api/groups/action','POST',{action:current?'unblacklist':'blacklist',group_id:id});
  toast(current?'أُزيلت من القائمة السوداء':'أُضيفت للقائمة السوداء','info');
  _refreshGroups();
}
async function leaveGroup(id){
  if(!confirm('مغادرة هذه المجموعة؟')) return;
  try{await api('/api/groups/action','POST',{action:'leave',group_id:id});toast('تمت المغادرة','success');_refreshGroups();}
  catch(e){toast('خطأ: '+e.message,'error');}
}

function showNewImport(){
  showModal('استيراد جديد',`
    <div class="fg"><label class="flbl">الرابط أو القائمة (سطر لكل رابط)</label><textarea class="ftextarea" id="imp-src" rows="4" placeholder="https://t.me/+xxx&#10;@username"></textarea></div>

    <div class="fg"><label class="flbl">اسم الاستيراد</label><input class="finput" id="imp-name" placeholder="مجموعاتي"></div>
  `,submitNewImport);
  api('/api/accounts').then(accs=>{
    const sel=document.getElementById('imp-acc');if(!sel)return;
    const active=accs.filter(a=>a.status==='active');
    sel.innerHTML=active.length?active.map(a=>`<option value="${a.id}">${a.phone}</option>`).join(''):'<option value="">لا يوجد حساب نشط</option>';

async function submitNewImport(){
  const src=(document.getElementById('imp-src')?.value||'').trim();
  const accId=parseInt(document.getElementById('imp-acc')?.value||'0');
  const name=(document.getElementById('imp-name')?.value||'').trim()||'استيراد '+_importIdSeq;
  if(!src){toast('أدخل الروابط','error');return;}
  if(!accId){toast('اختر حساباً','error');return;}
  const links=src.split(/[\n,]+/).map(l=>l.trim()).filter(l=>l.length>3);
  if(links.length===0){toast('لا توجد روابط صالحة','error');return;}
  const job={id:_importIdSeq++,name,type:'folder',accountId:accId,links,total:links.length,joined:0,failed:0,failedLinks:[],groups:[],status:'running',date:new Date().toISOString().split('T')[0]};
  _importJobs.unshift(job);
  toast(`🚀 بدأ استيراد ${links.length} رابط...`,'info');
  renderFolders();
  for(const link of links){
    if(job.status==='paused')break;
    try{
      const res=await api('/api/groups/action','POST',{action:'join',account_id:accId,group_link:link});
      if(res.status==='ok'){job.joined++;job.groups.push({link,title:res.title||link});}
      else{job.failed++;job.failedLinks.push(link);}
    }catch(e){job.failed++;job.failedLinks.push(link);}
    if(state.page==='folders')renderFolders();
    await new Promise(r=>setTimeout(r,1500+Math.random()*1500));
  }
  job.status=job.failed===job.total?'failed':'done';
  if(state.page==='folders')renderFolders();
  toast(job.status==='done'?`✅ اكتمل: ${job.joined} منضم`:`⚠️ ${job.failed} فاشل من ${job.total}`,'success');
}
function deleteImport(id){if(!confirm('حذف هذا الاستيراد؟'))return;_importJobs=_importJobs.filter(j=>j.id!==id);renderFolders();toast('تم الحذف','success');}

  </div>

  ${commands.slice(0,20).map(r=>{
    const cmd=r.details?.command||'—';
    const ts=r.created_at?r.created_at.replace('T',' ').slice(0,16):'';
    const result=logs.find(l=>l.action==='copilot_done'&&l.created_at>r.created_at);
    const isErr=logs.find(l=>l.action==='copilot_error'&&l.created_at>r.created_at);
    const status=result?'done':isErr?'failed':'running';
    return `<div class="row-card">
      <div class="row-card-hdr">
        <div class="row-card-title">${cmd}</div>
        ${statusBadge(status)}
      </div>
      <div class="row-card-sub">${ts}</div>
      ${result?`<div style="margin-top:6px;font-size:11px;color:var(--green)">✅ ${(result.details?.result||'').slice(0,100)}</div>`:''}
    </div>`;
  }).join('')}
  ${commands.length===0?`<div class="empty-state"><div class="es-icon">🤖</div><p>لم يُرسل أي أمر بعد</p></div>`:''}`;
}
async function sendEngineerCmd(){
  const input=document.getElementById('eng-cmd');const btn=document.getElementById('eng-btn');const status=document.getElementById('eng-status');
  if(!input)return;const cmd=input.value.trim();if(!cmd){toast('اكتب أمراً','error');return;}
  input.disabled=true;btn.disabled=true;btn.textContent='⏳';
  status.style.display='block';status.textContent='⏳ الوكلاء يعملون...';
  try{
    await api('/api/copilot','POST',{command:cmd});
    input.value='';status.style.color='var(--green)';status.textContent='✅ تم إرسال الأمر';
    toast('✅ أمر الوكيل أُرسل','success');
    setTimeout(()=>renderEngineer(),3000);
  }catch(e){status.style.color='var(--danger)';status.textContent='❌ '+e.message;toast('فشل الإرسال','error');}
  finally{input.disabled=false;btn.disabled=false;btn.textContent='▶';}
}

function showModal(title,bodyHtml,onConfirm){
  const ov=document.createElement('div');
  ov.className='modal-overlay';
  ov.innerHTML=`<div class="modal">
    <div class="modal-hdr"><div class="modal-title">${title}</div><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div id="modal-body">${bodyHtml}</div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal()">إلغاء</button>
      ${onConfirm?`<button class="btn btn-primary" id="modal-confirm">تأكيد</button>`:''}
    </div>
  </div>`;
  ov.id='modal-overlay';
  ov.addEventListener('click',e=>{if(e.target===ov)closeModal();});
  document.body.appendChild(ov);
  if(onConfirm){
    document.getElementById('modal-confirm').onclick=async()=>{
      try{await onConfirm();closeModal();}
      catch(e){toast('خطأ: '+e.message,'error');}
    };
  }
}
function closeModal(){document.getElementById('modal-overlay')?.remove();}

function showAddAccount(){
  showModal('إضافة حساب تيليجرام',`
    <div class="alert alert-info">أدخل رقم الهاتف مع مفتاح الدولة (+966...)</div>
    <div class="fg"><label class="flbl">رقم الهاتف</label><input class="finput" id="aa-phone" placeholder="+966501234567" type="tel"></div>
    <div id="aa-code-section" style="display:none">

      <div class="fg"><label class="flbl">كود التحقق</label><input class="finput" id="aa-code" placeholder="12345" type="number"></div>
      <div class="fg"><label class="flbl">كلمة المرور (اختياري)</label><input class="finput" type="password" id="aa-pass"></div>
    </div>
    <div id="aa-action"><button class="btn btn-primary btn-full" onclick="sendPhoneCode()">📱 إرسال الكود</button></div>
  `,null);
}
async function sendPhoneCode(){
  const phone=document.getElementById('aa-phone')?.value?.trim();
  if(!phone){toast('أدخل رقم الهاتف','error');return;}
  try{
    const r=await api('/api/accounts/add','POST',{phone});
    if(r.status==='code_sent'){
      document.getElementById('aa-code-section').style.display='block';
      document.getElementById('aa-action').innerHTML=`<button class="btn btn-success btn-full" onclick="verifyPhoneCode('${phone}')">✅ تحقق من الكود</button>`;
      toast('تم إرسال الكود','success');
    }else toast('خطأ: '+(r.detail||r.status),'error');
  }catch(e){toast('خطأ: '+e.message,'error');}
}
async function verifyPhoneCode(phone){
  const code=document.getElementById('aa-code')?.value?.trim();
  const pass=document.getElementById('aa-pass')?.value?.trim();
  if(!code){toast('أدخل الكود','error');return;}
  try{
    const r=await api('/api/accounts/verify','POST',{phone,code,password:pass||undefined});
    if(r.status==='ok'){toast('✅ تم تفعيل الحساب!','success');closeModal();renderAccounts();}
    else if(r.status==='2fa_required') toast('🔐 كلمة المرور مطلوبة','info');
    else toast('خطأ: '+(r.detail||r.status),'error');
  }catch(e){toast('خطأ: '+e.message,'error');}
}
